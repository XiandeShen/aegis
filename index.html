<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Aegis - Encrypted</title>
    
    <link rel="apple-touch-icon" sizes="180x180" href="https://xiandeshen.github.io/aegis/icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="https://xiandeshen.github.io/aegis/icon.png">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Aegis">

    <style>
        * { box-sizing: border-box; }
        
        /* 明亮模式纯净颜色变量映射 */
        :root {
            --bg-base: #f5f5f7; 
            --accent: #007aff; 
            --danger: #ff3b30; 
            --secondary: #86868b;
            --side-gap: 20px; 
            --glass-bg: rgba(255, 255, 255, 0.75); 
            --glass-blur: blur(20px);
            --glass-border: 1px solid rgba(255, 255, 255, 0.6); 
            --card-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
            --radius-lg: 28px; 
            --radius-md: 14px;
            --font-apple: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", "PingFang SC", "Segoe UI", sans-serif;
            --font-mono: "SF Mono", SFMono-Regular, ui-monospace, Menlo, Monaco, Consolas, monospace;
            
            --text-main: #1d1d1f;
            --text-placeholder: #a1a1a6;
            --action-btn-bg: rgba(0, 0, 0, 0.04);
            --action-btn-active: rgba(0, 0, 0, 0.08);
            --search-focus-bg: #ffffff;
            --modal-content-bg: #ffffff;
            --modal-content-border: 1px solid rgba(0,0,0,0.05);
            --modal-close-bg: rgba(0, 0, 0, 0.05);
            --info-item-bg: rgba(0, 0, 0, 0.03);
            --info-item-border: 1px solid rgba(0, 0, 0, 0.02);
            --info-item-active: rgba(0, 0, 0, 0.06);
            --info-item-focus-bg: #ffffff;
            --login-card-bg: rgba(255, 255, 255, 0.45);
            --login-card-border: 1px solid rgba(255, 255, 255, 0.45);
            --login-input-bg: rgba(255, 255, 255, 0.75);
            --login-input-border: 1px solid rgba(0, 0, 0, 0.05);
            --scrollbar-thumb-bg: rgba(0, 0, 0, 0.12);
            --scrollbar-thumb-hover: rgba(0, 0, 0, 0.24);
            --gradient-color-1: #e2e8f0;
            --gradient-color-2: #f9fafb;
        }

        /* 原生 Apple 质感暗色变量映射 */
        [data-theme="dark"] {
            --bg-base: #000000;
            --accent: #0a84ff;
            --danger: #ff453a;
            --secondary: #8e8e93;
            --glass-bg: rgba(28, 28, 30, 0.75);
            --glass-border: 1px solid rgba(255, 255, 255, 0.1);
            --card-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            --text-main: #f5f5f7;
            --text-placeholder: #48484a;
            --action-btn-bg: rgba(255, 255, 255, 0.1);
            --action-btn-active: rgba(255, 255, 255, 0.18);
            --search-focus-bg: #1c1c1e;
            --modal-content-bg: #1c1c1e;
            --modal-content-border: 1px solid rgba(255, 255, 255, 0.1);
            --modal-close-bg: rgba(255, 255, 255, 0.12);
            --info-item-bg: rgba(255, 255, 255, 0.04);
            --info-item-border: 1px solid rgba(255, 255, 255, 0.02);
            --info-item-active: rgba(255, 255, 255, 0.1);
            --info-item-focus-bg: #1c1c1e;
            --login-card-bg: rgba(28, 28, 30, 0.45);
            --login-card-border: 1px solid rgba(255, 255, 255, 0.15);
            --login-input-bg: rgba(255, 255, 255, 0.05);
            --login-input-border: 1px solid rgba(255, 255, 255, 0.1);
            --scrollbar-thumb-bg: rgba(255, 255, 255, 0.15);
            --scrollbar-thumb-hover: rgba(255, 255, 255, 0.3);
            --gradient-color-1: #111827;
            --gradient-color-2: #030712;
        }

        /* 自动随系统时的暗色媒体查询机制 */
        @media (prefers-color-scheme: dark) {
            :root:not([data-theme="light"]) {
                --bg-base: #000000;
                --accent: #0a84ff;
                --danger: #ff453a;
                --secondary: #8e8e93;
                --glass-bg: rgba(28, 28, 30, 0.75);
                --glass-border: 1px solid rgba(255, 255, 255, 0.1);
                --card-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
                --text-main: #f5f5f7;
                --text-placeholder: #48484a;
                --action-btn-bg: rgba(255, 255, 255, 0.1);
                --action-btn-active: rgba(255, 255, 255, 0.18);
                --search-focus-bg: #1c1c1e;
                --modal-content-bg: #1c1c1e;
                --modal-content-border: 1px solid rgba(255, 255, 255, 0.1);
                --modal-close-bg: rgba(255, 255, 255, 0.12);
                --info-item-bg: rgba(255, 255, 255, 0.04);
                --info-item-border: 1px solid rgba(255, 255, 255, 0.02);
                --info-item-active: rgba(255, 255, 255, 0.1);
                --info-item-focus-bg: #1c1c1e;
                --login-card-bg: rgba(28, 28, 30, 0.45);
                --login-card-border: 1px solid rgba(255, 255, 255, 0.15);
                --login-input-bg: rgba(255, 255, 255, 0.05);
                --login-input-border: 1px solid rgba(255, 255, 255, 0.1);
                --scrollbar-thumb-bg: rgba(255, 255, 255, 0.15);
                --scrollbar-thumb-hover: rgba(255, 255, 255, 0.3);
                --gradient-color-1: #111827;
                --gradient-color-2: #030712;
            }
        }

        body, html {
            margin: 0; padding: 0; width: 100%; min-height: 100%;
            background-color: var(--bg-base); color: var(--text-main);
            font-family: var(--font-apple);
            -webkit-font-smoothing: antialiased; -webkit-tap-highlight-color: transparent; overflow-x: hidden;
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        
        body.modal-open-fixed {
            position: fixed !important;
            left: 0 !important;
            top: 0 !important;
            width: 100% !important;
            height: 100% !important;
            overflow: hidden !important;
        }

        button, input, textarea, select {
            font-family: var(--font-apple) !important;
            -webkit-font-smoothing: antialiased;
        }

        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--scrollbar-thumb-bg);
            border-radius: 10px;
            transition: background 0.2s ease;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--scrollbar-thumb-hover);
        }

        .info-block-content.note-container-fixed::-webkit-scrollbar,
        .info-block-item textarea.add-note-input::-webkit-scrollbar {
            width: 4px;
        }
        .info-block-content.note-container-fixed::-webkit-scrollbar-track,
        .info-block-item textarea.add-note-input::-webkit-scrollbar-track {
            background: transparent;
        }
        .info-block-content.note-container-fixed::-webkit-scrollbar-thumb,
        .info-block-item textarea.add-note-input::-webkit-scrollbar-thumb {
            background: var(--scrollbar-thumb-bg);
            border-radius: 10px;
        }
        .info-block-content.note-container-fixed::-webkit-scrollbar-thumb:hover,
        .info-block-item textarea.add-note-input::-webkit-scrollbar-thumb:hover {
            background: var(--scrollbar-thumb-hover);
        }

        .gradient-bg {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, var(--gradient-color-1) 0%, var(--gradient-color-2) 50%, var(--gradient-color-1) 100%);
            background-size: 400% 400%; animation: gradientFlow 15s ease-in-out infinite; z-index: -1;
            display: none; 
        }
        body.unlocked .gradient-bg {
            display: block;
        }
        @keyframes gradientFlow { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        header {
            position: fixed; top: 0; left: 0; width: 100%;
            padding: calc(16px + env(safe-area-inset-top)) var(--side-gap) 16px;
            z-index: 100; display: flex; justify-content: space-between; align-items: center;
            background: var(--bg-base); 
            height: calc(72px + env(safe-area-inset-top)); 
            transition: background-color 0.3s ease;
        }
        .brand { display: flex; align-items: center; gap: 12px; flex-shrink: 0; height: 40px; }
        
        .brand-logo-wrapper, .modal-icon-wrapper { 
            width: 40px; height: 40px; border-radius: 10px; 
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
            background: rgba(0, 122, 255, 0.08); color: var(--accent);
        }
        .brand-logo-wrapper svg, .modal-icon-wrapper svg { width: 22px; height: 22px; display: block; }
        .modal-icon-wrapper.danger-style { background: rgba(255, 59, 48, 0.1); color: var(--danger); }

        .brand-name { font-size: 19px; font-weight: 800; letter-spacing: 0.25em; text-transform: uppercase; font-family: var(--font-apple); line-height: 40px; height: 40px; display: flex; align-items: center; }
        
        body:not(.unlocked) .page-wrapper,
        body:not(.unlocked) .modal-overlay {
            display: none !important;
            pointer-events: none !important;
        }

        body:has(#auth-ui[style*="display: flex"]) header .brand,
        body:has(#auth-ui:not([style*="display: none"])) header .brand {
            opacity: 0; pointer-events: none;
        }

        .header-actions { display: flex; gap: 10px; visibility: hidden; align-items: center; height: 40px; }
        
        .action-btn { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; border-radius: 10px; background: var(--action-btn-bg); border: 1px solid transparent; flex-shrink: 0; color: var(--text-main); }
        .action-btn:active { background: var(--action-btn-active); }
        
        .page-wrapper { width: 100%; max-width: 1000px; margin: 0 auto; min-height: 100vh; padding: calc(76px + env(safe-area-inset-top)) var(--side-gap) 40px; }

        .main-search-area {
            width: 100%;
            margin-bottom: 20px;
            display: none;
        }
        .search-wrapper { 
            display: flex; align-items: center; background: var(--action-btn-bg); border-radius: 14px; 
            width: 100%; height: 46px; overflow: hidden; position: relative; border: 1px solid transparent; 
            transition: border-color 0.2s, box-shadow 0.2s, background-color 0.2s; 
        }
        .search-icon { width: 44px; height: 46px; display: flex; align-items: center; justify-content: center; color: var(--secondary); flex-shrink: 0; }
        .search-input { border: none; background: transparent; height: 100%; width: 100%; padding: 0 4px 0 0; font-size: 16px; outline: none !important; box-shadow: none !important; color: var(--text-main); line-height: normal; font-family: var(--font-apple); }
        .search-input::placeholder { color: var(--text-placeholder); }
        .search-clear { width: 40px; height: 46px; color: var(--secondary); cursor: pointer; display: none; align-items: center; justify-content: center; flex-shrink: 0; }
        
        .search-wrapper:focus-within { background: var(--search-focus-bg); border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.12); }
        .search-wrapper.has-content .search-clear { display: flex; }

        #list-container { display: grid; grid-template-columns: 100%; gap: 16px; }
        @media (min-width: 768px) { #list-container { grid-template-columns: repeat(2, 1fr); gap: 20px; } }
        
        /* 【已优化】移动端卡片触控及颜色深度过滤机制 */
        .item-card { 
            background: var(--glass-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
            border-radius: var(--radius-lg); border: var(--glass-border); box-shadow: var(--card-shadow); 
            padding: 22px; position: relative; 
            /* 移除可能在滑动时产生不必要位移重绘的 transform 过渡，只保留核心质感变色 */
            transition: background-color 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease; 
            min-height: 110px; cursor: pointer; user-select: none; -webkit-user-select: none;
            will-change: background-color;
        }
        /* 仅在非移动端（大屏设备）启用 Hover 浮动，从根本上杜绝手机端点击后卡片卡在 Hover 态 */
        @media (min-width: 1025px) {
            .item-card:hover { transform: translateY(-2px); }
        }
        /* 克制、高级的移动端原生按压状态，杜绝任何白光误触穿帮 */
        .item-card:active { background-color: rgba(0, 0, 0, 0.04) !important; }
        [data-theme="dark"] .item-card:active { background-color: rgba(255, 255, 255, 0.05) !important; }
        @media (prefers-color-scheme: dark) {
            :root:not([data-theme="light"]) .item-card:active { background-color: rgba(255, 255, 255, 0.05) !important; }
        }
        
        .card-info { padding-right: 20px; text-align: left; pointer-events: none; }
        .item-name { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; margin:0; font-size:18px; font-weight: 700; font-family: var(--font-apple); }
        .info-row { margin-top: 6px; display: flex; flex-direction: column; gap: 2px; }
        .item-user, .pass-val { font-size:13px; font-family: var(--font-mono); }
        .item-user { color:var(--secondary); margin: 0; }
        .pass-val { color: var(--accent); opacity: 0.8; }
        
        .item-time { position: absolute; bottom: 22px; right: 22px; font-size: 11px; color: var(--secondary); opacity: 0.4; font-family: var(--font-mono); line-height: 1.5; pointer-events: none; }

        .auth-viewport { 
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex; align-items: center; justify-content: center; 
            padding: env(safe-area-inset-top) var(--side-gap) env(safe-area-inset-bottom);
            z-index: 150;
        }
        .glass-card { background: var(--glass-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); border-radius: var(--radius-lg); border: var(--glass-border); padding: 32px 24px; width: 100%; max-width: 340px; text-align: center; }
        
        .auth-form-body input { width: 100%; height: 50px; padding: 0 16px; margin: 8px 0; border-radius: var(--radius-md); border: var(--login-input-border); font-size: 16px; outline: none; background: var(--login-input-bg); font-family: var(--font-apple); color: var(--text-main); }
        .auth-form-body input::placeholder { color: var(--text-placeholder); }
        .primary-btn { width: 100%; height: 50px; background: var(--accent); border: none; border-radius: var(--radius-md); color: white; font-size: 16px; font-weight: 600; cursor: pointer; transition: opacity 0.3s; font-family: var(--font-apple); }
        .primary-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .modal-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0, 0, 0, 0.15); z-index: 200; display: none; 
            align-items: center; justify-content: center;
            padding: var(--side-gap);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            overflow: hidden;
        }
        
        .page-modal-content { 
            width: 100%; max-width: 440px; 
            display: flex; flex-direction: column; text-align: left;
            background: var(--modal-content-bg); border-radius: 24px; padding: 24px; position: relative;
            box-shadow: 0 12px 40px rgba(0,0,0,0.12); border: var(--modal-content-border);
            max-height: calc(100vh - 40px); 
            animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            overflow: hidden;
            transition: background-color 0.3s;
        }

        .modal-scroll-area {
            width: 100%;
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding-right: 6px; 
        }

        .modal-page-header { 
            margin-bottom: 20px; display: flex; flex-direction: row; align-items: center; justify-content: space-between; gap: 12px; height: 40px; 
            flex-shrink: 0;
        }
        .modal-header-left { display: flex; align-items: center; gap: 12px; height: 40px; }
        
        .page-modal-content h3 { font-size: 20px; font-weight: 700; color: var(--text-main); margin: 0; letter-spacing: -0.02em; text-transform: none; font-family: var(--font-apple); line-height: 40px; height: 40px; display: flex; align-items: center; }

        .modal-close-x {
            position: absolute; top: 24px; right: 24px; width: 30px; height: 30px;
            border-radius: 50%; background: var(--modal-close-bg); color: var(--secondary);
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            border: none; z-index: 11; transition: background 0.2s, color 0.2s;
        }
        .modal-close-x:active { background: var(--action-btn-active); color: var(--text-main); }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.93) translateY(12px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        @media (max-width: 480px) {
            .modal-overlay { 
                background: var(--bg-base); 
                padding: 0; 
                align-items: flex-start; 
            }
            .page-modal-content { 
                max-height: 100dvh !important; 
                min-height: 100dvh !important;
                height: 100dvh !important;
                max-height: 100% !important; 
                box-shadow: none; 
                border: none; 
                padding: 0 var(--side-gap) calc(24px + env(safe-area-inset-bottom)) !important; 
                background: var(--bg-base); 
                animation: none; 
                border-radius: 0;
            }
            
            .modal-page-header { 
                display: flex !important;
                flex-direction: row !important;
                align-items: center !important; 
                justify-content: space-between !important; 
                gap: 12px !important; 
                padding: calc(16px + env(safe-area-inset-top)) 0 12px !important; 
                margin-bottom: 8px !important; 
                height: calc(68px + env(safe-area-inset-top)) !important; 
                background: var(--bg-base);
                position: relative;
                z-index: 10;
                transition: background-color 0.3s;
            }

            .modal-header-left {
                display: flex !important;
                align-items: center !important;
                gap: 12px !important;
                height: 40px !important; 
            }
            
            .modal-close-x { 
                position: absolute !important; 
                top: calc(16px + env(safe-area-inset-top)) !important;
                right: 0 !important;
                width: 40px !important; 
                height: 40px !important; 
                border-radius: 10px !important;
                background: var(--action-btn-bg) !important; 
                margin: 0 !important;
                flex-shrink: 0 !important;
            } 
            
            .page-modal-content h3 { 
                font-size: 19px !important; 
                font-weight: 700 !important; 
                letter-spacing: -0.01em !important; 
                text-transform: none !important; 
                color: var(--text-main) !important; 
                margin: 0 !important;
                line-height: 40px !important;
                height: 40px !important;
                display: flex !important;
                align-items: center !important;
            }

            .modal-scroll-area {
                padding-bottom: 12px;
                overscroll-behavior-y: contain; 
            }
        }

        .apple-group-box, .info-cell-group {
            background: transparent; border: none; padding: 0; margin-bottom: 12px;
            display: flex; flex-direction: column; gap: 12px; 
        }

        .info-block-item {
            background: var(--info-item-bg); 
            border-radius: 16px; 
            padding: 12px 16px;
            border: var(--info-item-border);
            display: flex; 
            flex-direction: column; 
            gap: 4px;
            width: 100%;
            cursor: pointer;
            transition: background-color 0.2s, border-color 0.25s, box-shadow 0.25s;
        }
        .info-block-item.editable-box { cursor: default; } 
        .info-block-item:not(.editable-box):not(.edit-mode-active):active { background-color: var(--info-item-active); }
        
        .info-block-item:focus-within {
            background: var(--info-item-focus-bg);
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.08);
        }

        .info-block-label {
            font-size: 12px;
            color: var(--secondary);
            font-weight: 600;
            user-select: none;
            font-family: var(--font-apple);
        }

        .info-block-content {
            font-size: 16px;
            color: var(--text-main);
            text-align: left; 
            word-break: break-all;
            width: 100%;
            height: 26px; 
            line-height: 26px !important; 
            display: block;
            overflow: hidden;
            padding: 0 !important;
            margin: 0 !important;
        }
        #detail-name, #detail-user, .font-style-apple { font-family: var(--font-apple) !important; }
        #detail-pass, .font-style-mono { font-family: var(--font-mono) !important; }
        
        .info-block-content.highlight { color: var(--accent); font-weight: 700; }
        .info-block-content.note-style { font-size: 15px; color: var(--text-main); }

        .info-block-content.note-container-fixed,
        .info-block-item textarea.add-note-input {
            height: 80px !important;
            max-height: 80px !important;
            line-height: 1.4 !important; 
            padding-top: 0 !important;
            resize: none;
            word-break: break-all;
            overflow-y: auto;
            padding-right: 6px !important; 
        }
        #edit-note { font-family: var(--font-apple) !important; font-size: 15px !important; }
        
        .info-block-content.note-empty {
            color: var(--secondary);
            opacity: 0.5;
            font-style: italic;
            font-family: var(--font-apple) !important;
        }

        .info-block-item input, .info-block-item textarea {
            background: transparent !important;
            border: none !important;
            margin: 0 !important;
            padding: 0 !important;
            border-radius: 0 !important;
            height: 26px !important; 
            line-height: 26px !important; 
            font-size: 16px !important;
            box-shadow: none !important;
            width: 100% !important;
            outline: none !important; 
            color: var(--text-main) !important;
        }
        .info-block-item input::placeholder, .info-block-item textarea::placeholder { color: var(--text-placeholder) !important; }
        #edit-name, #edit-user { font-family: var(--font-apple) !important; }
        #edit-pass { font-family: var(--font-mono) !important; }

        .modal-action-row { display: flex; gap: 12px; width: 100%; margin-top: 14px; flex-shrink: 0; }
        .modal-action-row .primary-btn, .modal-action-row .secondary-text-btn, .modal-action-row .danger-btn { flex: 1; height: 50px; border-radius: var(--radius-md); font-size: 16px; font-weight: 600; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-family: var(--font-apple); }
        .modal-action-row .secondary-text-btn { background: var(--action-btn-bg); color: var(--text-main); transition: background 0.2s, transform 0.1s; }
        .modal-action-row .secondary-text-btn:active { background: var(--action-btn-active); transform: scale(0.98); }
        .modal-action-row .danger-btn { background: rgba(255, 59, 48, 0.1); color: var(--danger); transition: background 0.2s, transform 0.1s; font-family: var(--font-apple); }
        .modal-action-row .danger-btn:active { background: rgba(255, 59, 48, 0.18); transform: scale(0.98); }
        .modal-action-row .danger-btn.shake-active { animation: btnWiggle 0.25s ease-in-out infinite; background: var(--danger); color: #fff; }
        @keyframes btnWiggle { 0% { transform: rotate(-1deg); } 50% { transform: rotate(1deg); } 100% { transform: rotate(-1deg); } }

        #toast { position: fixed; bottom: 50px; left: 50%; transform: translateX(-50%) translateY(20px); background: rgba(0,0,0,0.85); color: white; padding: 12px 24px; border-radius: 24px; z-index: 1000; opacity: 0; pointer-events: none; transition: all 0.4s; font-family: var(--font-apple); font-size: 14px; }
        [data-theme="dark"] #toast { background: rgba(255,255,255,0.85); color: #000; }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .status-msg { width: 100%; padding: 60px 0; color: var(--secondary); text-align: center; grid-column: 1/-1; font-family: var(--font-apple); }

        #login-card {
            background: var(--login-card-bg); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); border: var(--login-card-border); box-shadow: 0 4px 24px -1px rgba(0, 0, 0, 0.01), 0 24px 60px -8px rgba(0, 0, 0, 0.05), inset 0 1px 0 rgba(255, 255, 255, 0.4);
            width: 100%; max-width: 360px; padding: 24px; border-radius: 30px; display: flex; flex-direction: column; position: relative;
        }
        .card-brand-header { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; }
        .card-brand-logo { color: var(--accent); display: flex; align-items: center; }
        .card-brand-name { font-size: 15px; font-weight: 800; letter-spacing: 0.25em; color: var(--text-main); font-family: var(--font-apple); line-height: 1; }
        #login-card h2 { display: none; }
        
        .auth-form-body { display: flex; flex-direction: column; gap: 0; }
        .auth-input-button-row { display: flex; gap: 10px; width: 100%; align-items: center; }
        .auth-input-button-row input { margin: 0; flex: 1; background: var(--login-input-bg); border: var(--login-input-border); border-radius: 15px; height: 50px; font-size: 15px; color: var(--text-main); box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.01); transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); font-family: var(--font-apple); }
        .auth-input-button-row input::placeholder { color: var(--text-placeholder); }
        .auth-input-button-row input:focus { background: var(--info-item-focus-bg); border-color: var(--accent); box-shadow: 0 0 0 4px rgba(0, 122, 255, 0.12); }
        
        .auth-input-button-row .primary-btn { width: 90px; flex-shrink: 0; background: linear-gradient(180deg, #2f91ff 0%, var(--accent) 100%); border-radius: 15px; height: 50px; font-size: 15px; font-weight: 600; box-shadow: 0 4px 14px rgba(0, 122, 255, 0.15); transition: all 0.25s ease; font-family: var(--font-apple); }
        .auth-input-button-row .primary-btn:hover:not(:disabled) { opacity: 0.95; transform: translateY(-0.5px); }
        
        #setup-area { animation: fadeInFlag 0.4s ease forwards; width: 100%; margin-bottom: 12px; }
        @keyframes fadeInFlag { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
        
        #reset-link { 
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1) !important; 
            font-weight: 500; padding: 8px 12px; display: inline-block; text-align: center; margin-top: 16px !important; width: 100%; background: transparent !important; font-family: var(--font-apple);
        }
        #reset-link:hover { opacity: 1 !important; color: var(--danger) !important; }
        #reset-link:active { color: var(--danger) !important; transform: scale(0.97); }

        button, input, textarea, .action-btn, .tool-btn, .info-block-item {
            -webkit-tap-highlight-color: transparent !important;
            outline: none !important;
        }
        .primary-btn {
            transition: opacity 0.2s ease, transform 0.15s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.2s ease !important;
        }

            opacity: 0.9;
        }

<script>
    const SVGIcons = {
        filePlus: `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="12" y1="18" x2="12" y2="12"></line><line x1="9" y1="15" x2="15" y2="15"></line></svg>`,
        editPencil: `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>`,
        eyeLook: `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>`,
        
        sun: `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>`,
        moon: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`,
        auto: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><path d="M12 2a10 10 0 0 1 0 20V2z"/></svg>`
    };

    let currentThemeMode = localStorage.getItem('ae_theme_mode') || 'auto';

    function initTheme() {
        const root = document.documentElement;
        const themeBtn = document.getElementById('theme-btn');
        if (!themeBtn) return;
        
        if (currentThemeMode === 'light') {
            root.setAttribute('data-theme', 'light');
            themeBtn.innerHTML = SVGIcons.sun;
            themeBtn.style.color = '#ff9500';
        } else if (currentThemeMode === 'dark') {
            root.setAttribute('data-theme', 'dark');
            themeBtn.innerHTML = SVGIcons.moon;
            themeBtn.style.color = '#5e5ce6';
        } else {
            root.removeAttribute('data-theme');
            themeBtn.innerHTML = SVGIcons.auto;
            themeBtn.style.color = 'var(--secondary)';
        }
    }

    function toggleThemeMode() {
        if (currentThemeMode === 'auto') {
            currentThemeMode = 'light';
        } else if (currentThemeMode === 'light') {
            currentThemeMode = 'dark';
        } else {
            currentThemeMode = 'auto';
        }
        localStorage.setItem('ae_theme_mode', currentThemeMode);
        initTheme();
        const modeNames = { 'auto': '自动跟随系统', 'light': '明亮模式', 'dark': '深色模式' };
        showToast(`已切换至: ${modeNames[currentThemeMode]}`);
    }

    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
        if (currentThemeMode === 'auto') initTheme();
    });

    const CryptoSvc = {
        _key: null,
        async deriveKey(pass) {
            const enc = new TextEncoder();
            const baseKey = await crypto.subtle.importKey("raw", enc.encode(pass), "PBKDF2", false, ["deriveKey"]);
            this._key = await crypto.subtle.deriveKey(
                { name: "PBKDF2", salt: enc.encode("aegis-salt-2024"), iterations: 100000, hash: "SHA-256" },
                baseKey, { name: "AES-GCM", length: 256 }, false, ["encrypt", "decrypt"]
            );
        },
        async encrypt(text) {
            const iv = crypto.getRandomValues(new Uint8Array(12));
            const encoded = new TextEncoder().encode(text);
            const cipher = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, this._key, encoded);
            return btoa(JSON.stringify({ iv: Array.from(iv), data: Array.from(new Uint8Array(cipher)) }));
        },
        async decrypt(blob) {
            try {
                const { iv, data } = JSON.parse(atob(blob));
                const decrypted = await crypto.subtle.decrypt(
                    { name: "AES-GCM", iv: new Uint8Array(iv) },
                    this._key, new Uint8Array(data)
                );
                return new TextDecoder().decode(decrypted);
            } catch(e) { return null; }
        }
    };

    let FINAL_TOKEN = "", GIST_ID = localStorage.getItem('ae_gid'), ENCRYPTED_TK = localStorage.getItem('ae_enc_tk');
    let pendingDeleteCardId = null, currentEditId = null, CACHED_LIST = []; 
    let lastScrollY = 0, isInsideEditMode = false, activeItemBackup = null; 

    document.addEventListener('focusout', (e) => {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') {
            setTimeout(() => {
                const scrollHeight = document.documentElement.scrollTop || document.body.scrollTop || 0;
                window.scrollTo(0, Math.max(scrollHeight - 1, 0));
            }, 60);
        }
    });

    document.addEventListener('click', (e) => {
        if (pendingDeleteCardId && !e.target.closest('#detail-del-btn')) { clearPendingDelete(); }
    });

    document.addEventListener('touchmove', (e) => {
        if (document.body.classList.contains('modal-open-fixed')) {
            if (!e.target.closest('.modal-scroll-area')) { 
                e.preventDefault(); 
            }
        }
    }, { passive: false });

    function handleSearchUI(input) {
        const wrapper = document.getElementById('search-wrapper');
        const hasText = input.value.length > 0;
        
        if (hasText) wrapper.classList.add('has-content'); else wrapper.classList.remove('has-content');
        handleSearch(input.value);
        
        if (hasText && window.scrollY > 20) {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    }
    
    function clearSearch() {
        const input = document.getElementById('search-bar');
        input.value = ''; handleSearchUI(input); input.focus();
    }

    /* 【已优化】精准融合移动端防抖锁机制 */
    function render(list, isSearching = false) {
        if (!isSearching) CACHED_LIST = list; 
        const c = document.getElementById('list-container');
        c.innerHTML = list.length ? '' : `<div class="status-msg">${isSearching ? '未找到相关凭据' : '暂无凭据'}</div>`;
        
        list.sort((a,b)=>b.id-a.id).forEach(item => {
            const div = document.createElement('div');
            div.className = 'item-card'; div.id = `card-${item.id}`;

            div.innerHTML = `
                <div class="card-info">
                    <h3 class="item-name">${item.name}</h3>
                    <div class="info-row">
                        <p class="item-user">${item.user || '-'}</p>
                        <div class="pass-val">••••••••</div>
                    </div>
                </div>
                ${item.updatedAt ? `<div class="item-time">${item.updatedAt}</div>` : ''} 
            `;
            
            // 引入移动端专属防误触局部状态锁
            let touchStartY = 0;
            let isScrolling = false;

            div.addEventListener('touchstart', (e) => {
                touchStartY = e.touches[0].clientY;
                isScrolling = false;
            }, { passive: true });

            div.addEventListener('touchmove', (e) => {
                const touchMoveY = e.touches[0].clientY;
                // 当滑动振幅超过 10 像素时，判定用户是在滚动列表而非故意点击
                if (Math.abs(touchMoveY - touchStartY) > 10) {
                    isScrolling = true;
                }
            }, { passive: true });

            div.addEventListener('touchend', (e) => {
                if (isScrolling) {
                    // 如果处于滑动页面态，阻止默认的点击事件扩散传递
                    e.preventDefault();
                }
            }, { passive: false });

            div.addEventListener('click', (e) => {
                if (isScrolling) return; // 滑动中，完美拦截二级菜单的穿帮弹出
                showDetails(item);
            });

            c.appendChild(div);
        });
        pendingDeleteCardId = null; 
    }

    function clearPendingDelete() {
        if (!pendingDeleteCardId) return;
        const delBtn = document.getElementById('detail-del-btn');
        if (delBtn) {
            delBtn.classList.remove('shake-active');
            delBtn.innerText = "删除";
        }
        pendingDeleteCardId = null;
    }

    async function confirmDelete(id) { 
        const delBtn = document.getElementById('detail-del-btn');
        
        if (pendingDeleteCardId !== id) {
            clearPendingDelete(); 
            pendingDeleteCardId = id;
            if (delBtn) {
                delBtn.classList.add('shake-active');
                delBtn.innerText = "确 认";
            }
            return; 
        }
        
        try { 
            showToast("正在同步删除...");
            toggleModal('pass-modal', false);
            let list = await getLatest(); 
            list = list.filter(i => i.id != id); 
            await updateCloud(list); 
            clearSearch(); 
        } catch(e) { 
            showToast("删除失败"); 
            clearPendingDelete();
        }
    }

    function showDetails(item) {
        activeItemBackup = item; 
        currentEditId = item.id;
        isInsideEditMode = false;

        document.getElementById('pass-modal-icon-container').innerHTML = SVGIcons.eyeLook;
        document.getElementById('detail-modal-title').innerText = "凭据详情";
        
        document.getElementById('detail-name').innerText = item.name || '-';
        document.getElementById('detail-user').innerText = item.user || '-';
        document.getElementById('detail-pass').innerText = item.pass || '-';
        
        const noteEl = document.getElementById('detail-note');
        if (item.note && item.note.trim()) {
            noteEl.innerText = item.note;
            noteEl.classList.remove('note-empty');
        } else {
            noteEl.innerText = "暂无备注...";
            noteEl.classList.add('note-empty');
        }

        document.getElementById('edit-name').value = item.name;
        document.getElementById('edit-user').value = item.user || '';
        document.getElementById('edit-pass').value = item.pass;
        document.getElementById('edit-note').value = item.note || '';

        switchInlineUIMode(false);
        clearPendingDelete();
        toggleModal('pass-modal', true);

        window.requestAnimationFrame(() => {
            noteEl.scrollTop = 0;
            document.getElementById('edit-note').scrollTop = 0;
        });
        
        document.getElementById('copy-all-btn').onclick = function() {
            const allText = `名称: ${item.name || '-'}\n账号: ${item.user || '-'}\n密码: ${item.pass || '-'}${item.note ? `\n备注: ${item.note}` : ''}`;
            navigator.clipboard.writeText(allText).then(() => showToast("全部内容已复制")).catch(() => showToast("复制失败"));
        };

        document.getElementById('detail-edit-btn').onclick = function() {
            startInlineEdit();
        };
        
        document.getElementById('detail-del-btn').onclick = function() {
            confirmDelete(item.id);
        };
    }

    function handleCellClick(type, labelName) {
        if (isInsideEditMode) return; 
        if (type === 'note' && document.getElementById('detail-note').classList.contains('note-empty')) return;
        
        const text = document.getElementById(`detail-${type}`).innerText;
        if (!text || text === '-') return;
        navigator.clipboard.writeText(text).then(() => {
            showToast(`${labelName}已复制`);
        }).catch(() => showToast("复制失败"));
    }

    function startInlineEdit() {
        isInsideEditMode = true;
        
        document.getElementById('pass-modal-icon-container').innerHTML = SVGIcons.editPencil;
        document.getElementById('detail-modal-title').innerText = "修改凭据";

        switchInlineUIMode(true);

        document.getElementById('edit-cancel-btn').onclick = function() {
            showDetails(activeItemBackup); 
        };

        document.getElementById('edit-save-btn').onclick = async function() {
            const name = document.getElementById('edit-name').value.trim();
            const pass = document.getElementById('edit-pass').value.trim();
            if (!name || !pass) return;

            const saveBtn = document.getElementById('edit-save-btn');
            saveBtn.disabled = true; saveBtn.innerText = "同步中...";

            const now = new Date();
            const timeStr = `${now.getFullYear()}-${(now.getMonth()+1).toString().padStart(2, '0')}-${now.getDate().toString().padStart(2, '0')} ${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;

            try {
                let list = await getLatest();
                const payload = { 
                    name, 
                    user: document.getElementById('edit-user').value, 
                    pass, 
                    note: document.getElementById('edit-note').value, 
                    updatedAt: timeStr 
                };
                
                const index = list.findIndex(i => i.id == currentEditId);
                if (index !== -1) {
                    list[index] = { ...list[index], ...payload };
                    activeItemBackup = list[index]; 
                }
                
                await updateCloud(list);
                clearSearch();
                showDetails(activeItemBackup); 
            } catch (e) {
                showToast("同步失败");
            } finally {
                saveBtn.disabled = false; saveBtn.innerText = "同步云端";
            }
        };
    }

    function switchInlineUIMode(toEditMode) {
        const fields = ['name', 'user', 'pass', 'note'];
        fields.forEach(f => {
            const cell = document.getElementById(`box-${f}`);
            const textEl = document.getElementById(`detail-${f}`);
            const inputEl = document.getElementById(`edit-${f}`);
            
            if (toEditMode) {
                cell.classList.add('edit-mode-active');
                textEl.style.display = 'none';
                inputEl.style.display = 'block';
            } else {
                cell.classList.remove('edit-mode-active');
                textEl.style.display = 'block';
                inputEl.style.display = 'none';
            }
        });

        window.requestAnimationFrame(() => {
            document.getElementById('detail-note').scrollTop = 0;
            document.getElementById('edit-note').scrollTop = 0;
        });

        document.getElementById('detail-actions-row').style.display = toEditMode ? 'none' : 'flex';
        document.getElementById('edit-actions-row').style.display = toEditMode ? 'flex' : 'none';
    }

    function openAddModal() { 
        currentEditId = null; 
        document.getElementById('modal-title').innerText = "新增凭据";
        document.getElementById('add-modal-icon-container').innerHTML = SVGIcons.filePlus;
        ['add-name','add-user','add-pass','add-note'].forEach(i => document.getElementById(i).value=''); 
        toggleModal('add-modal', true); 
    }
    
    function softLock() { location.reload(); }
    
    function toggleModal(id, show) { 
        const overlay = document.getElementById(id + '-overlay');
        const scrollArea = overlay.querySelector('.modal-scroll-area');
        
        if (show) {
            lastScrollY = window.scrollY;
            if(scrollArea) scrollArea.scrollTop = 0; 
            overlay.style.display = 'flex';
            document.body.style.top = `-${lastScrollY}px`;
            document.body.classList.add('modal-open-fixed');
        } else {
            overlay.style.display = 'none';
            
            if (id === 'pass-modal') {
                if (scrollArea) scrollArea.scrollTop = 0;

                document.getElementById('detail-note').scrollTop = 0;
                document.getElementById('edit-note').scrollTop = 0;

                document.getElementById('detail-name').innerText = '';
                document.getElementById('detail-user').innerText = '';
                document.getElementById('detail-pass').innerText = '';
                document.getElementById('detail-note').innerText = '';
                
                document.getElementById('edit-name').value = '';
                document.getElementById('edit-user').value = '';
                document.getElementById('edit-pass').value = '';
                document.getElementById('edit-note').value = '';
                
                switchInlineUIMode(false);
            }

            if (id === 'add-modal') {
                if (scrollArea) scrollArea.scrollTop = 0;
                document.getElementById('add-note').scrollTop = 0;
            }
            
            if (!document.querySelector('.modal-overlay[style*="display: flex"]')) {
                document.body.classList.remove('modal-open-fixed');
                document.body.style.top = '';
                window.scrollTo(0, lastScrollY);
            }
        }
    }
    
    function showToast(m) { const t=document.getElementById('toast'); t.innerText=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'), 2000); }

    async function handleAuth() {
        const pass = document.getElementById('main-pass').value; if (!pass) return;
        const submitBtn = document.getElementById('login-submit-btn');
        
        submitBtn.disabled = true;
        submitBtn.innerText = "解密中";
        
        document.getElementById('main-pass').blur();
        const tokenInput = document.getElementById('gh-token');
        if(tokenInput) tokenInput.blur();
        
        await new Promise(resolve => {
            window.requestAnimationFrame(() => {
                setTimeout(resolve, 450); 
            });
        }); 

        try {
            await CryptoSvc.deriveKey(pass);
            if (!ENCRYPTED_TK) {
                const tk = document.getElementById('gh-token').value.trim(); 
                if (!tk.startsWith('ghp_')) { 
                    showToast("Token无效"); 
                    submitBtn.disabled = false; submitBtn.innerText = "登录"; 
                    return; 
                }
                const encryptedTk = await CryptoSvc.encrypt(tk);
                localStorage.setItem('ae_enc_tk', encryptedTk); FINAL_TOKEN = tk;
            } else {
                const decryptedTk = await CryptoSvc.decrypt(ENCRYPTED_TK);
                if (!decryptedTk) {
                    showToast("密码错误或数据损坏");
                    submitBtn.disabled = false; submitBtn.innerText = "登录";
                    return;
                }
                FINAL_TOKEN = decryptedTk;
            }
            
            submitBtn.innerText = "加载中";
            const syncSuccess = await startPreloadSync();
            
            if (syncSuccess) {
                document.body.classList.add('unlocked');
                document.getElementById('auth-ui').style.display = 'none'; 
                document.getElementById('main-ui').style.display = 'block'; 
                document.getElementById('search-zone').style.display = 'block'; 
                document.getElementById('actions').style.visibility = 'visible'; 
                
                window.scrollTo(0, 0);
                document.body.scrollTop = 0;
            } else {
                submitBtn.disabled = false; 
                submitBtn.innerText = "登录";
            }
        } catch(e) {
            showToast("解密失败，请重试");
            submitBtn.disabled = false; submitBtn.innerText = "登录";
        }
    }

    async function startPreloadSync() {
        try {
            const resp = await fetch('https://api.github.com/gists', { headers: { 'Authorization': `token ${FINAL_TOKEN}` } });
            if (!resp.ok) throw new Error("Network response error");
            
            const data = await resp.json(); 
            const db = data.find(g => g.files['aegis_db.json']);
            
            if(db) {
                GIST_ID = db.id; localStorage.setItem('ae_gid', GIST_ID);
                const detailResp = await fetch(db.url, { headers: { Authorization: `token ${FINAL_TOKEN}` } });
                const detail = await detailResp.json();
                const rawContent = detail.files['aegis_db.json'].content;
                let list = [];
                if (rawContent && rawContent !== "[]") {
                    const decrypted = await CryptoSvc.decrypt(rawContent); 
                    list = JSON.parse(decrypted || "[]");
                }
                render(list); 
                return true;
            } else { 
                return await startSyncNew(); 
            }
        } catch(e) { 
            showToast("同步云端数据失败"); 
            return false;
        }
    }

    async function startSyncNew() {
        try {
            const res = await fetch('https://api.github.com/gists', {
                method: 'POST', headers: { Authorization: `token ${FINAL_TOKEN}` },
                body: JSON.stringify({ description: "Aegis Data", public: false, files: { "aegis_db.json": { content: "[]" } } })
            });
            if (!res.ok) return false;
            const data = await res.json(); GIST_ID = data.id; localStorage.setItem('ae_gid', GIST_ID); 
            render([]); 
            return true;
        } catch(e) { 
            showToast("初始化失败"); 
            return false;
        }
    }

    async function startSync() {
        try {
            let list = await getLatest();
            render(list);
        } catch(e) {
            document.getElementById('list-container').innerHTML = '<div class="status-msg">同步失败</div>';
        }
    }

    function handleSearch(val) { const query = (val || "").toLowerCase().trim(); if (!query) { render(CACHED_LIST); return; } render(CACHED_LIST.filter(item => item.name.toLowerCase().includes(query) || (item.user && item.user.toLowerCase().includes(query))), true); }
    
    async function save() { 
        const name = document.getElementById('add-name').value.trim(), pass = document.getElementById('add-pass').value.trim(); 
        if(!name || !pass) return;
        const saveBtn = document.getElementById('save-btn'); saveBtn.disabled = true; saveBtn.innerText = "同步中...";
        
        const now = new Date();
        const timeStr = `${now.getFullYear()}-${(now.getMonth()+1).toString().padStart(2, '0')}-${now.getDate().toString().padStart(2, '0')} ${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;

        try { 
            let list = await getLatest(); 
            const payload = { name, user: document.getElementById('add-user').value, pass, note: document.getElementById('add-note').value, updatedAt: timeStr };
            list.push({ ...payload, id: Date.now() }); 
            await updateCloud(list); clearSearch(); toggleModal('add-modal', false); 
        } catch (e) { showToast("同步失败"); } finally { 
            saveBtn.disabled = false; saveBtn.innerText = "同步云端"; 
        }
    }

    async function getLatest() { 
        const r = await fetch(`https://api.github.com/gists/${GIST_ID}`, { headers: { Authorization: `token ${FINAL_TOKEN}` }}); 
        const data = await r.json(); const content = data.files['aegis_db.json'].content;
        if (!content || content === "[]") return [];
        const decrypted = await CryptoSvc.decrypt(content); return JSON.parse(decrypted || "[]");
    }

    async function updateCloud(list) { 
        const encryptedData = await CryptoSvc.encrypt(JSON.stringify(list));
        await fetch(`https://api.github.com/gists/${GIST_ID}`, { 
            method: 'PATCH', headers: { Authorization: `token ${FINAL_TOKEN}` }, 
            body: JSON.stringify({ files: { "aegis_db.json": { content: encryptedData } } }) 
        }); 
        render(list); showToast("已同步"); 
    }

    function hardReset() { localStorage.clear(); location.reload(); }
    if (!ENCRYPTED_TK) { document.getElementById('auth-brand-text').innerText = "AEGIS SETUP"; document.getElementById('setup-area').style.display = "block"; } else { document.getElementById('reset-link').style.display = "block"; }
    
    initTheme();
</script>
