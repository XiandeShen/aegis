<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Aegis</title>
    <link id="favicon" rel="icon" type="image/svg+xml">
    <style>
        * { box-sizing: border-box; }

        :root {
            --bg-base: #f5f5f7;
            --accent: #007aff;
            --danger: #ff3b30;
            --secondary: #86868b;
            --side-gap: 20px;
            --glass-bg: rgba(255, 255, 255, 0.75);
            --glass-blur: blur(20px);
            --glass-border: 1px solid rgba(255, 255, 255, 0.6);
            --card-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
            --radius-lg: 28px;
            --radius-md: 14px;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; min-height: 100%;
            background-color: var(--bg-base);
            color: #1d1d1f;
            font-family: -apple-system, "SF Pro Display", "PingFang SC", sans-serif;
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }

        .gradient-bg {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(135deg, #e2e8f0 0%, #f9fafb 50%, #e2e8f0 100%);
            background-size: 400% 400%;
            animation: gradientFlow 15s ease-in-out infinite;
            z-index: -1;
        }
        @keyframes gradientFlow { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        header {
            position: fixed; top: 0; left: 0; width: 100%;
            padding: calc(18px + env(safe-area-inset-top)) var(--side-gap) 15px;
            z-index: 100;
            display: flex; justify-content: space-between; align-items: center;
            background: var(--bg-base);
            border-bottom: 0.5px solid rgba(0,0,0,0.05);
        }

        .brand { display: flex; align-items: center; gap: 10px; }
        .brand-logo { color: var(--accent); display: flex; align-items: center; }
        .brand-name { font-size: 19px; font-weight: 800; letter-spacing: 0.25em; text-transform: uppercase; color: #1d1d1f; }

        .header-actions { display: flex; gap: 12px; visibility: hidden; }
        .action-btn {
            width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; border-radius: 12px; 
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(0, 0, 0, 0.05); 
            transition: all 0.2s;
        }

        .page-wrapper {
            width: 100%; max-width: 1000px; margin: 0 auto;
            padding: calc(110px + env(safe-area-inset-top)) var(--side-gap) 40px;
        }

        #list-container { 
            display: grid; 
            grid-template-columns: 100%; 
            gap: 16px; 
            width: 100%;
            text-align: center;
        }
        @media (min-width: 768px) { 
            #list-container { grid-template-columns: repeat(2, 1fr); gap: 20px; } 
        }

        .status-msg {
            grid-column: 1 / -1; 
            width: 100%;
            padding-top: 60px;
            color: var(--secondary);
            font-size: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .item-card, .glass-card { 
            background: var(--glass-bg); 
            backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
            border-radius: var(--radius-lg); 
            border: var(--glass-border); 
            box-shadow: var(--card-shadow);
            width: 100%;
            text-align: left;
        }

        .item-card { 
            padding: 22px; 
            display: flex; 
            flex-direction: column; 
            transition: transform 0.2s; 
            position: relative; /* 必须为按钮定位基准 */
        }
        .item-card:active { transform: scale(0.98); }

        /* 按钮群组：右上角绝对定位 */
        .card-actions { 
            position: absolute; 
            top: 18px; 
            right: 18px; 
            display: flex; 
            gap: 2px; 
        }

        .card-info { flex: 1; width: 100%; padding-right: 110px; } /* 为按钮留空，防止重叠 */
        .item-name { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; margin:0; font-size:18px; font-weight: 700; color: #1d1d1f; }
        
        /* 账号密码布局 */
        .info-row { margin-top: 6px; display: flex; flex-direction: column; gap: 2px; }
        .item-user, .pass-val { font-size:13px; font-family: ui-monospace, monospace; word-break: break-all; }
        .item-user { color:var(--secondary); margin: 0; }
        
        .pass-val { 
            color: var(--accent); 
            filter: blur(5px); opacity: 0.3; transition: all 0.3s ease; user-select: none;
        }
        .item-card.revealed .pass-val { filter: blur(0); opacity: 1; user-select: text; }

        .tool-btn { 
            width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
            border: none; background: transparent; color: var(--secondary); cursor: pointer; 
            border-radius: 8px; transition: all 0.2s;
        }
        .tool-btn.active { color: var(--accent); background: rgba(0, 122, 255, 0.1); }

        .item-note { margin:10px 0 0 0; padding-top: 10px; border-top: 0.5px solid rgba(0,0,0,0.05); font-size:12px; color: var(--secondary); opacity: 0.8; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        .auth-viewport { display: flex; align-items: center; justify-content: center; min-height: 100vh; width: 100%; padding: 0 var(--side-gap); }
        .glass-card { padding: 32px 24px; width: 100%; max-width: 340px; text-align: center; }

        input { 
            width: 100%; height: 50px; padding: 0 16px; margin: 8px 0; border-radius: var(--radius-md); 
            border: 1px solid rgba(0,0,0,0.08); font-size: 16px; outline: none;
            background: rgba(255,255,255,0.6); transition: all 0.2s; -webkit-appearance: none;
        }
        input:focus { border-color: var(--accent); background: #fff; }

        .primary-btn { 
            width: 100%; height: 50px; background: var(--accent); border: none; border-radius: var(--radius-md); 
            color: white; font-size: 16px; font-weight: 600; margin-top: 12px; cursor: pointer; transition: all 0.2s;
            -webkit-appearance: none;
        }
        .primary-btn:disabled { opacity: 0.6; cursor: not-allowed; }

        .modal-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.25); 
            z-index: 200; display: none; align-items: center; justify-content: center; 
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); padding: 0 var(--side-gap);
        }

        #toast { 
            position: fixed; bottom: -80px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); color: white; 
            padding: 12px 24px; border-radius: 24px; font-size: 14px; transition: 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); z-index: 1000;
        }
        #toast.show { bottom: 50px; }
    </style>
</head>
<body>

<div class="gradient-bg"></div>

<header>
    <div class="brand">
        <div class="brand-logo">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 22C12 22 20 18 20 12V5L12 2L4 5V12C4 12 12 22 12 22Z"/><path d="M9 12L11 14L15 10"/>
            </svg>
        </div>
        <div class="brand-name">AEGIS</div>
    </div>
    <div class="header-actions" id="actions">
        <div class="action-btn" onclick="startSync()" style="color:var(--accent)"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg></div>
        <div class="action-btn" onclick="openAddModal()" style="color:var(--accent)"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></div>
        <div class="action-btn" onclick="softLock()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div>
    </div>
</header>

<div class="auth-viewport" id="auth-ui">
    <div class="glass-card" id="login-card">
        <h2 style="margin-top:0">解锁保险库</h2>
        <input type="password" id="main-pass" placeholder="解锁密码" autofocus>
        <div id="setup-area" style="display:none; margin-top:10px;"><input type="password" id="gh-token" placeholder="GitHub Token"></div>
        <button class="primary-btn" onclick="handleAuth()">进入 AEGIS</button>
        <p id="reset-link" style="font-size:12px; color:#86868b; margin-top:25px; cursor:pointer; display:none; opacity:0.6" onclick="toggleModal('hard-reset', true)">重置 Token 配置</p>
    </div>
</div>

<div class="page-wrapper" id="main-ui" style="display:none">
    <div id="list-container"></div>
</div>

<div class="modal-overlay" id="add-modal-overlay">
    <div class="glass-card">
        <h3 id="modal-title" style="margin-top:0">凭据操作</h3>
        <input type="text" id="add-name" placeholder="应用名称">
        <input type="text" id="add-user" placeholder="用户名/账号">
        <input type="password" id="add-pass" placeholder="登录密码">
        <input type="text" id="add-note" placeholder="备注（可选）">
        <button class="primary-btn" id="save-btn" onclick="save()">同步至云端</button>
        <button class="primary-btn" style="background:none; color:var(--accent); margin-top:8px" onclick="toggleModal('add-modal', false)">取消</button>
    </div>
</div>

<div class="modal-overlay" id="confirm-modal-overlay">
    <div class="glass-card">
        <h3 style="color:var(--danger); margin-top:0">确认删除？</h3>
        <button class="primary-btn" id="confirm-delete-btn" style="background:var(--danger)">确定删除</button>
        <button class="primary-btn" style="background:none; color:var(--accent); margin-top:8px" onclick="toggleModal('confirm-modal', false)">取消</button>
    </div>
</div>

<div class="modal-overlay" id="hard-reset-overlay">
    <div class="glass-card">
        <h3 style="color:var(--danger); margin-top:0">确定重置吗？</h3>
        <button class="primary-btn" style="background:var(--danger)" onclick="hardReset()">确定重置</button>
        <button class="primary-btn" style="background:none; color:var(--accent); margin-top:8px" onclick="toggleModal('hard-reset', false)">取消</button>
    </div>
</div>

<div id="toast">已完成</div>

<script>
    let FINAL_TOKEN = "";
    let GIST_ID = localStorage.getItem('ae_gid');
    const ENCRYPTED_TK = localStorage.getItem('ae_enc_tk');
    let deleteTargetId = null;
    let currentEditId = null;

    function generateFavicon() {
        const svg = btoa(`<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#007aff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22C12 22 20 18 20 12V5L12 2L4 5V12C4 12 12 22 12 22Z M9 12L11 14L15 10"/></svg>`);
        document.getElementById('favicon').setAttribute('href', `data:image/svg+xml;base64,${svg}`);
    }
    generateFavicon();

    if (!ENCRYPTED_TK) { 
        document.querySelector('#login-card h2').innerText = "初始化配置"; 
        document.getElementById('setup-area').style.display = "block"; 
    } else { 
        document.getElementById('reset-link').style.display = "block"; 
    }

    async function handleAuth() {
        const pass = document.getElementById('main-pass').value;
        if (!pass) return;
        if (!ENCRYPTED_TK) {
            const tk = document.getElementById('gh-token').value.trim();
            if (!tk.startsWith('ghp_')) { showToast("Token无效"); return; }
            localStorage.setItem('ae_enc_tk', btoa(pass + "|" + tk));
            FINAL_TOKEN = tk;
        } else {
            try {
                const dec = atob(ENCRYPTED_TK).split('|');
                if (dec[0] !== pass) { showToast("密码错误"); return; }
                FINAL_TOKEN = dec[1];
            } catch(e) { hardReset(); }
        }
        document.getElementById('auth-ui').style.display = 'none';
        document.getElementById('main-ui').style.display = 'block';
        document.getElementById('actions').style.visibility = 'visible';
        startSync();
    }

    async function startSync() {
        const container = document.getElementById('list-container');
        container.innerHTML = '<div class="status-msg">同步中...</div>';
        try {
            const resp = await fetch('https://api.github.com/gists', { headers: { 'Authorization': `token ${FINAL_TOKEN}` } });
            const data = await resp.json();
            const db = data.find(g => g.files['aegis_db.json']);
            if(db) {
                GIST_ID = db.id;
                localStorage.setItem('ae_gid', GIST_ID);
                const detail = await (await fetch(db.url, { headers: { Authorization: `token ${FINAL_TOKEN}` } })).json();
                render(JSON.parse(detail.files['aegis_db.json'].content || "[]"));
            } else {
                const createResp = await fetch('https://api.github.com/gists', {
                    method: 'POST',
                    headers: { 'Authorization': `token ${FINAL_TOKEN}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ description: "Aegis Data", public: false, files: { "aegis_db.json": { content: "[]" } } })
                });
                const newGist = await createResp.json();
                GIST_ID = newGist.id;
                localStorage.setItem('ae_gid', GIST_ID);
                render([]);
            }
        } catch(e) { 
            container.innerHTML = '<div class="status-msg" style="color:var(--danger)">网络连接失败</div>'; 
        }
    }

    function render(list) {
        const c = document.getElementById('list-container');
        c.innerHTML = list.length ? '' : '<div class="status-msg">暂无凭据</div>';
        list.sort((a,b)=>b.id-a.id).forEach(item => {
            const div = document.createElement('div');
            div.className = 'item-card';
            div.id = `card-${item.id}`;
            const itemStr = JSON.stringify(item).replace(/"/g, '&quot;');
            div.innerHTML = `
                <div class="card-actions">
                    <button class="tool-btn" onclick="togglePass('${item.id}', this)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
                    <button class="tool-btn" onclick="copy('${item.pass}')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button>
                    <button class="tool-btn" onclick="openEditModal(${itemStr})"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
                    <button class="tool-btn" onclick="confirmDelete('${item.id}')" style="color:var(--danger)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>
                </div>
                <div class="card-info">
                    <h3 class="item-name">${item.name}</h3>
                    <div class="info-row">
                        <p class="item-user">${item.user || '-'}</p>
                        <div id="p-${item.id}" class="pass-val">${item.pass}</div>
                    </div>
                    ${item.note ? `<p class="item-note">${item.note}</p>` : ''}
                </div>`;
            c.appendChild(div);
        });
    }

    function openAddModal() {
        currentEditId = null;
        document.getElementById('modal-title').innerText = "新增凭据";
        ['add-name','add-user','add-pass','add-note'].forEach(i => document.getElementById(i).value='');
        toggleModal('add-modal', true);
    }

    function openEditModal(item) {
        currentEditId = item.id;
        document.getElementById('modal-title').innerText = "修改凭据";
        document.getElementById('add-name').value = item.name;
        document.getElementById('add-user').value = item.user;
        document.getElementById('add-pass').value = item.pass;
        document.getElementById('add-note').value = item.note || '';
        toggleModal('add-modal', true);
    }

    async function save() { 
        const name = document.getElementById('add-name').value.trim(); 
        const user = document.getElementById('add-user').value.trim(); 
        const pass = document.getElementById('add-pass').value.trim(); 
        const note = document.getElementById('add-note').value.trim();
        if(!name || !pass) return; 
        const saveBtn = document.getElementById('save-btn');
        saveBtn.disabled = true; saveBtn.innerText = "同步中...";
        try {
            let list = await getLatest(); 
            if (currentEditId) {
                const index = list.findIndex(i => i.id == currentEditId);
                if (index !== -1) list[index] = { ...list[index], name, user, pass, note };
            } else {
                list.push({name, user, pass, note, id: Date.now()}); 
            }
            await updateCloud(list); 
            toggleModal('add-modal', false); 
        } catch (e) { showToast("同步失败"); } finally {
            saveBtn.disabled = false; saveBtn.innerText = "同步至云端";
        }
    }

    function togglePass(id, btn) { 
        document.getElementById('card-' + id).classList.toggle('revealed'); 
        btn.classList.toggle('active');
    }
    
    function toggleModal(id, show) { document.getElementById(id + '-overlay').style.display = show ? 'flex' : 'none'; }

    function confirmDelete(id) { 
        deleteTargetId = id; 
        toggleModal('confirm-modal', true); 
        document.getElementById('confirm-delete-btn').onclick = async function() { 
            this.disabled = true;
            try {
                let list = await getLatest(); 
                list = list.filter(i => i.id != deleteTargetId); 
                await updateCloud(list); 
            } finally {
                this.disabled = false;
                toggleModal('confirm-modal', false); 
            }
        }; 
    }

    async function getLatest() { 
        const r = await fetch(`https://api.github.com/gists/${GIST_ID}`, { headers: { Authorization: `token ${FINAL_TOKEN}` }}); 
        const data = await r.json();
        return JSON.parse(data.files['aegis_db.json'].content || "[]"); 
    }

    async function updateCloud(list) { 
        await fetch(`https://api.github.com/gists/${GIST_ID}`, { 
            method: 'PATCH', 
            headers: { Authorization: `token ${FINAL_TOKEN}`, 'Content-Type': 'application/json' }, 
            body: JSON.stringify({ files: { "aegis_db.json": { content: JSON.stringify(list) } } }) 
        }); 
        render(list); 
        showToast("已同步"); 
    }

    function softLock() { location.reload(); }
    function hardReset() { localStorage.clear(); location.reload(); }
    function copy(t) { navigator.clipboard.writeText(t); showToast("已复制"); }
    function showToast(m) { 
        const t=document.getElementById('toast'); 
        t.innerText=m; t.classList.add('show'); 
        setTimeout(()=>t.classList.remove('show'), 2000); 
    }
</script>
</body>
</html>
