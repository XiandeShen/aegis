<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Aegis - Encrypted</title>
    
    <link rel="apple-touch-icon" sizes="180x180" href="https://xiandeshen.github.io/aegis/icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="https://xiandeshen.github.io/aegis/icon.png">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Aegis">

    <style>
        * { box-sizing: border-box; }
        :root {
            --bg-base: #f5f5f7; --accent: #007aff; --danger: #ff3b30; --secondary: #86868b;
            --side-gap: 20px; --glass-bg: rgba(255, 255, 255, 0.75); --glass-blur: blur(20px);
            --glass-border: 1px solid rgba(255, 255, 255, 0.6); --card-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
            --radius-lg: 28px; --radius-md: 14px;
        }
        body, html {
            margin: 0; padding: 0; width: 100%; min-height: 100%;
            background-color: var(--bg-base); color: #1d1d1f;
            font-family: -apple-system, "SF Pro Display", "PingFang SC", sans-serif;
            -webkit-font-smoothing: antialiased; -webkit-tap-highlight-color: transparent; overflow-x: hidden;
        }
        
        body.modal-open-fixed {
            position: fixed !important;
            left: 0 !important;
            width: 100% !important;
            overflow: hidden !important;
        }

        /* ─── 核心修改：默认隐藏渐变背景，只有在解锁成功、添加了 .unlocked 类后才显示，避免解锁页断层 ─── */
        .gradient-bg {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, #e2e8f0 0%, #f9fafb 50%, #e2e8f0 100%);
            background-size: 400% 400%; animation: gradientFlow 15s ease-in-out infinite; z-index: -1;
            display: none; 
        }
        body.unlocked .gradient-bg {
            display: block;
        }
        @keyframes gradientFlow { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        /* ─── 核心修改：顶部栏保持 100% 纯实色不透明，向上翻动时完美遮挡底层卡片 ─── */
        header {
            position: fixed; top: 0; left: 0; width: 100%;
            padding: calc(18px + env(safe-area-inset-top)) var(--side-gap) 15px;
            z-index: 100; display: flex; justify-content: space-between; align-items: center;
            background: #f5f5f7; 
        }
        .brand { display: flex; align-items: center; gap: 10px; flex-shrink: 0; transition: opacity 0.25s ease; }
        .brand-logo { color: var(--accent); display: flex; align-items: center; }
        .brand-name { font-size: 19px; font-weight: 800; letter-spacing: 0.25em; text-transform: uppercase; }
        
        body:has(#auth-ui[style*="display: flex"]) header .brand,
        body:has(#auth-ui:not([style*="display: none"])) header .brand {
            opacity: 0; pointer-events: none;
        }

        .header-actions { display: flex; gap: 10px; visibility: hidden; align-items: center; flex: 1; justify-content: flex-end; margin-left: 12px; }
        .search-wrapper { display: flex; align-items: center; background: rgba(0, 0, 0, 0.05); border-radius: 12px; width: 40px; height: 40px; overflow: hidden; position: relative; border: 1px solid transparent; transition: border-color 0.2s, box-shadow 0.2s, background-color 0.2s; }
        .search-icon { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; color: var(--secondary); flex-shrink: 0; }
        .search-input { border: none; background: transparent; height: 100%; width: 0; padding: 0; font-size: 16px; outline: none !important; box-shadow: none !important; color: #1d1d1f; line-height: normal; }
        .search-clear { width: 32px; height: 40px; color: var(--secondary); cursor: pointer; display: none; align-items: center; justify-content: center; flex-shrink: 0; }
        
        .search-wrapper:focus-within { background: #fff; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.12); }

        @media (max-width: 767px) {
            .header-actions.search-active .action-btn { display: none; }
            .header-actions.search-active .search-wrapper { width: 100%; max-width: 200px; background: #fff; box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.12); border-color: var(--accent); }
            .header-actions.search-active .search-input { width: 100%; padding: 0 4px; }
        }
        @media (min-width: 768px) { .search-wrapper { width: 200px; transition: width 0.2s, border-color 0.2s, box-shadow 0.2s, background-color 0.2s; } .search-input { width: 100%; padding-right: 10px; } }
        .search-wrapper.has-content .search-clear { display: flex; }
        .action-btn { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; border-radius: 12px; background: rgba(255, 255, 255, 0.5); border: 1px solid rgba(0, 0, 0, 0.05); flex-shrink: 0; }
        
        /* 移动端首张卡片遮挡修复 - 恢复最初完美的间距比例 */
        .page-wrapper { width: 100%; max-width: 1000px; margin: 0 auto; min-height: 100vh; padding: calc(96px + env(safe-area-inset-top)) var(--side-gap) 40px; }
        @media (min-width: 768px) { .page-wrapper { padding-top: calc(106px + env(safe-area-inset-top)); } }

        #list-container { display: grid; grid-template-columns: 100%; gap: 16px; }
        @media (min-width: 768px) { #list-container { grid-template-columns: repeat(2, 1fr); gap: 20px; } }
        
        .item-card { 
            background: var(--glass-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
            border-radius: var(--radius-lg); border: var(--glass-border); box-shadow: var(--card-shadow); 
            padding: 22px; position: relative; transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s; min-height: 110px;
        }
        .item-card:hover:not(.shake-active) { transform: translateY(-2px); }
        
        /* 二次确认卡片抖动动画 */
        .item-card.shake-active {
            animation: cardWiggle 0.25s ease-in-out infinite;
            border-color: rgba(255, 59, 48, 0.45);
            box-shadow: 0 8px 24px rgba(255, 59, 48, 0.08);
        }
        @keyframes cardWiggle {
            0% { transform: rotate(-0.5deg); }
            50% { transform: rotate(0.5deg); }
            100% { transform: rotate(-0.5deg); }
        }

        .card-actions { position: absolute; top: 18px; right: 18px; display: flex; gap: 2px; }
        .card-info { padding-right: 80px; text-align: left; }
        .item-name { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; margin:0; font-size:18px; font-weight: 700; }
        .info-row { margin-top: 6px; display: flex; flex-direction: column; gap: 2px; }
        .item-user, .pass-val { font-size:13px; font-family: ui-monospace, monospace; }
        .item-user { color:var(--secondary); margin: 0; }
        .pass-val { color: var(--accent); opacity: 0.8; user-select: text; }
        .tool-btn { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border: none; background: transparent; color: var(--secondary); cursor: pointer; border-radius: 8px; transition: background 0.2s; }
        .tool-btn:hover { background: rgba(0,0,0,0.04); }
        .tool-btn.active { color: var(--accent); background: rgba(0, 122, 255, 0.1); }
        
        .item-time { position: absolute; bottom: 22px; right: 22px; font-size: 11px; color: var(--secondary); opacity: 0.4; font-family: ui-monospace, monospace; line-height: 1.5; }

        /* 视口全屏锁定，确保 iOS PWA 模式下解锁面板完美绝对居中 */
        .auth-viewport { 
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex; align-items: center; justify-content: center; 
            padding: env(safe-area-inset-top) var(--side-gap) env(safe-area-inset-bottom);
            z-index: 150;
        }
        .glass-card { background: var(--glass-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); border-radius: var(--radius-lg); border: var(--glass-border); padding: 32px 24px; width: 100%; max-width: 340px; text-align: center; }
        
        .auth-form-body input { width: 100%; height: 50px; padding: 0 16px; margin: 8px 0; border-radius: var(--radius-md); border: 1px solid rgba(0,0,0,0.08); font-size: 16px; outline: none; background: rgba(255,255,255,0.6); font-family: inherit; }
        .primary-btn { width: 100%; height: 50px; background: var(--accent); border: none; border-radius: var(--radius-md); color: white; font-size: 16px; font-weight: 600; cursor: pointer; transition: opacity 0.3s; }
        .primary-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* 二级页面遮罩层 */
        .modal-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0, 0, 0, 0.15); z-index: 200; display: none; 
            align-items: center; justify-content: center;
            padding: var(--side-gap);
            overflow-y: auto; -webkit-overflow-scrolling: touch;
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
        }
        
        /* 二级弹窗卡片容器 */
        .page-modal-content { 
            width: 100%; max-width: 440px; display: flex; flex-direction: column; text-align: left;
            background: #ffffff; border-radius: 24px; padding: 24px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.12); border: 1px solid rgba(0,0,0,0.05);
            max-height: calc(100vh - 40px); overflow-y: auto;
            animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        .page-modal-content::-webkit-scrollbar { width: 4px; }
        .page-modal-content::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 10px; }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.93) translateY(12px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* ─── 在移动端下让二级菜单的对应功能文字与图标，在尺寸排版上完全和底层 brand 重合 ─── */
        @media (max-width: 480px) {
            .modal-overlay { 
                background: #f5f5f7; 
                padding: calc(18px + env(safe-area-inset-top)) var(--side-gap) 40px; 
                align-items: flex-start; 
            }
            .page-modal-content { max-height: 100%; box-shadow: none; border: none; padding: 0; background: transparent; animation: none; overflow-y: visible; }
            
            .modal-page-header { 
                display: flex !important;
                flex-direction: row !important;
                align-items: center !important; 
                gap: 10px !important; 
                margin-bottom: 24px !important; 
                padding: 0 !important;
            }
            .modal-icon-wrapper { 
                background: transparent !important; 
                box-shadow: none !important; 
                width: auto !important; 
                height: auto !important; 
                display: flex !important;
                align-items: center !important;
                color: var(--accent) !important; 
            }
            .modal-icon-wrapper svg { width: 24px !important; height: 24px !important; }
            
            .page-modal-content h3 { 
                font-size: 19px !important; 
                font-weight: 800 !important; 
                letter-spacing: 0.25em !important; 
                text-transform: uppercase !important; 
                color: #1d1d1f !important; 
                margin: 0 !important;
            }
        }

        @media (min-width: 481px) {
            .modal-page-header { margin-bottom: 24px; display: flex; flex-direction: row; align-items: center; gap: 14px; padding-left: 2px; }
            .modal-icon-wrapper { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; background: #f5f5f7; box-shadow: 0 2px 8px rgba(0,0,0,0.02); color: var(--accent); }
            .modal-icon-wrapper svg { width: 24px; height: 24px; }
            .page-modal-content h3 { font-size: 22px; font-weight: 700; color: #1d1d1f; margin: 0; letter-spacing: -0.5px; }
        }

        .apple-group-box, .info-cell-group {
            background: transparent; border: none; padding: 0; margin-bottom: 12px;
            display: flex; flex-direction: column; gap: 12px; 
        }

        .info-block-item {
            background: rgba(0, 0, 0, 0.03); 
            border-radius: 16px; 
            padding: 12px 16px;
            border: 1px solid rgba(0, 0, 0, 0.02);
            display: flex; 
            flex-direction: column; 
            gap: 4px;
            width: 100%;
            cursor: pointer;
            transition: background-color 0.2s, border-color 0.25s, box-shadow 0.25s;
        }
        .info-block-item.editable-box { cursor: default; } 
        .info-block-item:not(.editable-box):active { background-color: rgba(0, 0, 0, 0.06); }
        
        .info-block-item:focus-within {
            background: #ffffff;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.08);
        }

        .info-block-label {
            font-size: 12px;
            color: var(--secondary);
            font-weight: 600;
            user-select: none;
        }

        .info-block-content {
            font-size: 16px;
            color: #1d1d1f;
            text-align: left; 
            word-break: break-all;
            font-family: ui-monospace, monospace;
            width: 100%;
            line-height: 1.4;
            display: block;
            overflow-y: auto;
            max-height: 160px; 
        }
        .info-block-content.highlight { color: var(--accent); font-weight: 700; }
        .info-block-content.note-style { font-family: inherit; font-size: 15px; color: #333; }

        .info-block-item input, .info-block-item textarea {
            background: transparent !important;
            border: none !important;
            margin: 0 !important;
            padding: 0 !important;
            border-radius: 0 !important;
            height: 26px !important; 
            font-size: 16px !important;
            box-shadow: none !important;
            width: 100% !important;
            outline: none !important; 
        }
        .info-block-item textarea.add-note-input {
            height: 80px !important;
            padding-top: 2px !important;
            resize: none;
            word-break: break-all;
            line-height: 1.4;
        }

        .info-block-content::-webkit-scrollbar, .info-block-item textarea::-webkit-scrollbar { width: 4px; }
        .info-block-content::-webkit-scrollbar-track, .info-block-item textarea::-webkit-scrollbar-track { background: transparent; }
        .info-block-content::-webkit-scrollbar-thumb, .info-block-item textarea::-webkit-scrollbar-thumb { background: rgba(0, 0, 0, 0); border-radius: 10px; transition: background 0.25s ease; }
        .info-block-item:hover .info-block-content::-webkit-scrollbar-thumb, .info-block-item:hover textarea::-webkit-scrollbar-thumb { background: rgba(0, 0, 0, 0.12); }

        .modal-action-row { display: flex; gap: 12px; width: 100%; margin-top: 14px; }
        .modal-action-row .primary-btn, .modal-action-row .secondary-text-btn { flex: 1; height: 50px; border-radius: var(--radius-md); font-size: 16px; font-weight: 600; border: none; cursor: pointer; }
        .modal-action-row .secondary-text-btn { background: rgba(0, 0, 0, 0.04); color: #1d1d1f; transition: background 0.2s, transform 0.1s; }
        .modal-action-row .secondary-text-btn:active { background: rgba(0, 0, 0, 0.08); transform: scale(0.98); }

        #toast { position: fixed; bottom: 50px; left: 50%; transform: translateX(-50%) translateY(20px); background: rgba(0,0,0,0.85); color: white; padding: 12px 24px; border-radius: 24px; z-index: 1000; opacity: 0; pointer-events: none; transition: all 0.4s; }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .status-msg { width: 100%; padding: 60px 0; color: var(--secondary); text-align: center; grid-column: 1/-1; }

        #login-card {
            background: rgba(255, 255, 255, 0.45); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); border: 1px solid rgba(255, 255, 255, 0.45); box-shadow: 0 4px 24px -1px rgba(0, 0, 0, 0.01), 0 24px 60px -8px rgba(0, 0, 0, 0.05), inset 0 1px 0 rgba(255, 255, 255, 0.4);
            width: 100%; max-width: 360px; padding: 24px; border-radius: 30px; display: flex; flex-direction: column; position: relative;
        }
        .card-brand-header { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; }
        .card-brand-logo { color: var(--accent); display: flex; align-items: center; }
        .card-brand-name { font-size: 15px; font-weight: 800; letter-spacing: 0.25em; color: #1d1d1f; }
        #login-card h2 { display: none; }
        
        .auth-form-body { display: flex; flex-direction: column; gap: 0; }
        .auth-input-button-row { display: flex; gap: 10px; width: 100%; align-items: center; }
        .auth-input-button-row input { margin: 0; flex: 1; background: rgba(255, 255, 255, 0.75); border: 1px solid rgba(0, 0, 0, 0.05); border-radius: 15px; height: 50px; font-size: 15px; color: #1d1d1f; box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.01); transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); }
        .auth-input-button-row input::placeholder { color: #a1a1a6; }
        .auth-input-button-row input:focus { background: #ffffff; border-color: var(--accent); box-shadow: 0 0 0 4px rgba(0, 122, 255, 0.12); }
        
        .auth-input-button-row .primary-btn { width: 90px; flex-shrink: 0; background: linear-gradient(180deg, #2f91ff 0%, var(--accent) 100%); border-radius: 15px; height: 50px; font-size: 15px; font-weight: 600; box-shadow: 0 4px 14px rgba(0, 122, 255, 0.15); transition: all 0.25s ease; }
        .auth-input-button-row .primary-btn:hover:not(:disabled) { opacity: 0.95; transform: translateY(-0.5px); }
        
        #setup-area { animation: fadeInFlag 0.4s ease forwards; width: 100%; margin-bottom: 12px; }
        @keyframes fadeInFlag { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
        
        #reset-link { 
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1) !important; 
            font-weight: 500; padding: 8px 12px; display: inline-block; text-align: center; margin-top: 16px !important; width: 100%; background: transparent !important;
        }
        #reset-link:hover { opacity: 1 !important; color: var(--danger) !important; }
        #reset-link:active { color: var(--danger) !important; transform: scale(0.97); }

        /* ─── 移动端点击高亮与焦点框完美优化 ─── */
        button, input, textarea, .action-btn, .tool-btn, .info-block-item {
            -webkit-tap-highlight-color: transparent !important;
            outline: none !important;
        }
        .primary-btn {
            transition: opacity 0.2s ease, transform 0.15s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.2s ease !important;
        }
        .primary-btn:not(:disabled):active {
            transform: scale(0.96);
            opacity: 0.9;
        }
        .primary-btn:disabled {
            opacity: 0.4;
            transform: scale(1) !important;
            cursor: not-allowed;
        }
        .modal-action-row .secondary-text-btn {
            transition: background-color 0.2s ease, transform 0.15s cubic-bezier(0.4, 0, 0.2, 1) !important;
        }
        .modal-action-row .secondary-text-btn:active {
            background: rgba(0, 0, 0, 0.08) !important;
            transform: scale(0.96) !important;
        }
    </style>
</head>
<body>
<div class="gradient-bg"></div>
<header>
    <div class="brand">
        <div class="brand-logo"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22C12 22 20 18 20 12V5L12 2L4 5V12C4 12 12 22 12 22Z"/><path d="M9 12L11 14L15 10"/></svg></div>
        <div class="brand-name">AEGIS</div>
    </div>
    <div class="header-actions" id="actions">
        <div class="search-wrapper" id="search-wrapper">
            <div class="search-icon" onclick="focusSearch()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            </div>
            <input type="text" id="search-bar" class="search-input" placeholder="搜索..." oninput="handleSearchUI(this)" onfocus="handleSearchUI(this)" onblur="handleSearchUI(this)">
            <div class="search-clear" onmousedown="event.preventDefault();clearSearch()" ontouchstart="event.preventDefault();clearSearch()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </div>
        </div>
        <div class="action-btn" onmousedown="event.preventDefault();openAddModal()" ontouchstart="event.preventDefault();openAddModal()" style="color:var(--accent)"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></div>
        <div class="action-btn" onmousedown="event.preventDefault();softLock()" ontouchstart="event.preventDefault();softLock()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div>
    </div>
</header>

<div class="auth-viewport" id="auth-ui">
    <div class="glass-card" id="login-card">
        <div class="card-brand-header">
            <div class="card-brand-logo">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22C12 22 20 18 20 12V5L12 2L4 5V12C4 12 12 22 12 22Z"/><path d="M9 12L11 14L15 10"/></svg>
            </div>
            <div class="card-brand-name" id="auth-brand-text">AEGIS</div>
        </div>
        <div class="auth-form-body">
            <div id="setup-area" style="display:none;"><input type="password" id="gh-token" placeholder="GitHub Token (ghp_...)"></div>
            <div class="auth-input-button-row">
                <input type="password" id="main-pass" placeholder="请键入密码" autofocus onkeydown="if(event.keyCode===13){handleAuth();}">
                <button class="primary-btn" onclick="handleAuth()">登录</button>
            </div>
            <p id="reset-link" style="font-size:12px; color:#86868b; cursor:pointer; display:none; opacity:0.6" onclick="toggleModal('hard-reset', true)">重置 Token 配置</p>
        </div>
    </div>
</div>

<div class="page-wrapper" id="main-ui" style="display:none"><div id="list-container"></div></div>

<div class="modal-overlay" id="add-modal-overlay">
    <div class="page-modal-content">
        <div class="modal-page-header">
            <div class="modal-icon-wrapper" id="add-modal-icon-container"></div>
            <h3 id="modal-title">新增凭据</h3>
        </div>
        <div class="apple-group-box">
            <div class="info-block-item editable-box">
                <div class="info-block-label">应用名称</div>
                <input type="text" id="add-name" placeholder="输入应用或网站名称">
            </div>
            <div class="info-block-item editable-box">
                <div class="info-block-label">用户名 / 账号</div>
                <input type="text" id="add-user" placeholder="输入登录账号">
            </div>
            <div class="info-block-item editable-box">
                <div class="info-block-label">登录密码</div>
                <input type="password" id="add-pass" placeholder="输入安全密码">
            </div>
            <div class="info-block-item editable-box">
                <div class="info-block-label">备注信息 (选填)</div>
                <textarea id="add-note" class="add-note-input" placeholder="可在此记录安全问题、附加密钥等长文本..."></textarea>
            </div>
        </div>
        <div class="modal-action-row">
            <button class="secondary-text-btn" onclick="toggleModal('add-modal', false)">取消</button>
            <button class="primary-btn" id="save-btn" onclick="save()">同步云端</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="hard-reset-overlay">
    <div class="page-modal-content">
        <div class="modal-page-header">
            <div class="modal-icon-wrapper danger-style">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
            </div>
            <h3 style="color:var(--danger)">确定重置所有配置吗？</h3>
        </div>
        <div class="modal-action-row">
            <button class="secondary-text-btn" onclick="toggleModal('hard-reset', false)">取消</button>
            <button class="primary-btn" style="background:var(--danger)" onclick="hardReset()">确定重置</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="pass-modal-overlay">
    <div class="page-modal-content">
        <div class="modal-page-header">
            <div class="modal-icon-wrapper" id="pass-modal-icon-container">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            </div>
            <h3 id="detail-modal-title">凭据详情</h3>
        </div>
        
        <div class="info-cell-group">
            <div class="info-block-item" onclick="copyTextFromCell('detail-name', '名称')">
                <div class="info-block-label">应用名称</div>
                <div class="info-block-content" id="detail-name"></div>
            </div>
            <div class="info-block-item" onclick="copyTextFromCell('detail-user', '账号')">
                <div class="info-block-label">登录账号</div>
                <div class="info-block-content" id="detail-user"></div>
            </div>
            <div class="info-block-item" onclick="copyTextFromCell('detail-pass', '密码')">
                <div class="info-block-label">安全密码</div>
                <div class="info-block-content highlight" id="detail-pass"></div>
            </div>
            <div class="info-block-item" id="detail-note-row" style="cursor: default;">
                <div class="info-block-label">备注信息</div>
                <div class="info-block-content note-style" id="detail-note"></div>
            </div>
        </div>

        <div class="modal-action-row">
            <button class="secondary-text-btn" onclick="toggleModal('pass-modal', false)">关闭</button>
            <button class="primary-btn" id="copy-all-btn">复制全部</button>
        </div>
    </div>
</div>

<div id="toast"></div>

<script>
    const SVGIcons = {
        filePlus: `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="12" y1="18" x2="12" y2="12"></line><line x1="9" y1="15" x2="15" y2="15"></line></svg>`,
        editPencil: `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>`
    };

    const CryptoSvc = {
        _key: null,
        async deriveKey(pass) {
            const enc = new TextEncoder();
            const baseKey = await crypto.subtle.importKey("raw", enc.encode(pass), "PBKDF2", false, ["deriveKey"]);
            this._key = await crypto.subtle.deriveKey(
                { name: "PBKDF2", salt: enc.encode("aegis-salt-2024"), iterations: 100000, hash: "SHA-256" },
                baseKey, { name: "AES-GCM", length: 256 }, false, ["encrypt", "decrypt"]
            );
        },
        async encrypt(text) {
            const iv = crypto.getRandomValues(new Uint8Array(12));
            const encoded = new TextEncoder().encode(text);
            const cipher = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, this._key, encoded);
            return btoa(JSON.stringify({ iv: Array.from(iv), data: Array.from(new Uint8Array(cipher)) }));
        },
        async decrypt(blob) {
            try {
                const { iv, data } = JSON.parse(atob(blob));
                const decrypted = await crypto.subtle.decrypt(
                    { name: "AES-GCM", iv: new Uint8Array(iv) },
                    this._key, new Uint8Array(data)
                );
                return new TextDecoder().decode(decrypted);
            } catch(e) { return null; }
        }
    };

    let FINAL_TOKEN = "", GIST_ID = localStorage.getItem('ae_gid'), ENCRYPTED_TK = localStorage.getItem('ae_enc_tk');
    let pendingDeleteCardId = null, currentEditId = null, CACHED_LIST = []; 
    let lastScrollY = 0; 

    document.addEventListener('click', (e) => {
        const bar = document.getElementById('search-bar');
        const wrapper = document.getElementById('search-wrapper');
        const isDelBtn = e.target.closest('.tool-btn[data-del-btn]'); 
        
        if (wrapper && !wrapper.contains(e.target) && bar && bar.value === "" && !e.target.closest('.tool-btn')) { bar.blur(); }
        if (pendingDeleteCardId && !isDelBtn) { clearPendingDelete(); }
    });

    document.addEventListener('touchmove', (e) => {
        if (document.body.classList.contains('modal-open-fixed')) {
            if (!e.target.closest('.modal-overlay')) {
                e.preventDefault();
            }
        } else {
            const bar = document.getElementById('search-bar');
            if (bar === document.activeElement && bar.value === "") { bar.blur(); }
        }
    }, { passive: false });

    function focusSearch() { document.getElementById('search-bar').focus(); }
    
    /* ─── 修正：彻底移除不美观的间距拉伸 CSS，改用优雅的无感 JS 瞬间置顶来解决移动端首卡遮挡 ─── */
    function handleSearchUI(input) {
        const wrapper = document.getElementById('search-wrapper'), actions = document.getElementById('actions');
        const hasText = input.value.length > 0;
        const isFocused = document.activeElement === input;
        if (hasText) wrapper.classList.add('has-content'); else wrapper.classList.remove('has-content');
        if (isFocused || hasText) actions.classList.add('search-active'); else actions.classList.remove('search-active');
        handleSearch(input.value);
        
        if (isFocused || hasText) {
            window.scrollTo({ top: 0, behavior: 'instant' });
        }
    }
    
    function clearSearch() {
        const input = document.getElementById('search-bar');
        input.value = ''; handleSearchUI(input); input.focus();
    }

    function render(list, isSearching = false) {
        if (!isSearching) CACHED_LIST = list; 
        const c = document.getElementById('list-container');
        c.innerHTML = list.length ? '' : `<div class="status-msg">${isSearching ? '未找到相关凭据' : '暂无凭据'}</div>`;
        list.sort((a,b)=>b.id-a.id).forEach(item => {
            const div = document.createElement('div');
            div.className = 'item-card'; div.id = `card-${item.id}`;
            const itemStr = JSON.stringify(item).replace(/"/g, '&quot;');

            div.innerHTML = `
                <div class="card-actions">
                    <button class="tool-btn" onmousedown="event.preventDefault();showDetails(${itemStr})" ontouchstart="event.preventDefault();showDetails(${itemStr})"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
                    <button class="tool-btn" onmousedown="event.preventDefault();openEditModal(${itemStr})" ontouchstart="event.preventDefault();openEditModal(${itemStr})"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
                    <button id="del-btn-${item.id}" data-del-btn="true" class="tool-btn" onmousedown="event.preventDefault();confirmDelete('${item.id}')" ontouchstart="event.preventDefault();confirmDelete('${item.id}')" style="color:var(--danger)">
                        <svg class="del-icon-raw" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2-2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                    </button>
                </div>
                <div class="card-info">
                    <h3 class="item-name">${item.name}</h3>
                    <div class="info-row">
                        <p class="item-user">${item.user || '-'}</p>
                        <div class="pass-val">••••••••</div>
                    </div>
                </div>
                ${item.updatedAt ? `<div class="item-time">${item.updatedAt}</div>` : ''} 
            `;
            c.appendChild(div);
        });
        pendingDeleteCardId = null; 
    }

    function clearPendingDelete() {
        if (!pendingDeleteCardId) return;
        const previousCard = document.getElementById(`card-${pendingDeleteCardId}`);
        const previousBtn = document.getElementById(`del-btn-${pendingDeleteCardId}`);
        if (previousCard) previousCard.classList.remove('shake-active');
        if (previousBtn) {
            previousBtn.innerHTML = `<svg class="del-icon-raw" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2-2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>`;
        }
        pendingDeleteCardId = null;
    }

    async function confirmDelete(id) { 
        const targetCard = document.getElementById(`card-${id}`);
        const targetBtn = document.getElementById(`del-btn-${id}`);
        
        if (pendingDeleteCardId !== id) {
            clearPendingDelete(); 
            pendingDeleteCardId = id;
            if (targetCard) targetCard.classList.add('shake-active');
            if (targetBtn) {
                targetBtn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>`;
            }
            return; 
        }
        
        try { 
            showToast("正在同步删除...");
            let list = await getLatest(); 
            list = list.filter(i => i.id != id); 
            await updateCloud(list); 
            clearSearch(); 
        } catch(e) { 
            showToast("删除失败"); 
            clearPendingDelete();
        }
    }

    function showDetails(item) {
        document.getElementById('detail-modal-title').innerText = "凭据详情";
        document.getElementById('detail-name').innerText = item.name || '-';
        document.getElementById('detail-user').innerText = item.user || '-';
        document.getElementById('detail-pass').innerText = item.pass || '-';
        
        const noteRow = document.getElementById('detail-note-row');
        if (item.note && item.note.trim()) {
            document.getElementById('detail-note').innerText = item.note;
            noteRow.style.display = 'flex';
        } else {
            noteRow.style.display = 'none';
        }

        toggleModal('pass-modal', true);
        
        /* ─── 保持修改：“复制全部”点击后一次性完整导出四大维度的文本内容 ─── */
        document.getElementById('copy-all-btn').onclick = function() {
            const allText = `名称: ${item.name || '-'}\n账号: ${item.user || '-'}\n密码: ${item.pass || '-'}${item.note ? `\n备注: ${item.note}` : ''}`;
            navigator.clipboard.writeText(allText).then(() => showToast("全部内容已复制")).catch(() => showToast("复制失败"));
        };
    }

    function copyTextFromCell(elementId, labelName) {
        const text = document.getElementById(elementId).innerText;
        if (!text || text === '-') return;
        navigator.clipboard.writeText(text).then(() => {
            showToast(`${labelName}已复制`);
        }).catch(() => showToast("复制失败"));
    }

    function openAddModal() { 
        currentEditId = null; 
        document.getElementById('modal-title').innerText = "新增凭据";
        document.getElementById('add-modal-icon-container').innerHTML = SVGIcons.filePlus;
        ['add-name','add-user','add-pass','add-note'].forEach(i => document.getElementById(i).value=''); 
        toggleModal('add-modal', true); 
    }
    
    function openEditModal(item) { 
        currentEditId = item.id; 
        document.getElementById('modal-title').innerText = "修改凭据"; 
        document.getElementById('add-modal-icon-container').innerHTML = SVGIcons.editPencil;
        document.getElementById('add-name').value = item.name; 
        document.getElementById('add-user').value = item.user; 
        document.getElementById('add-pass').value = item.pass; 
        document.getElementById('add-note').value = item.note || ''; 
        toggleModal('add-modal', true); 
    }
    
    function softLock() { location.reload(); }
    
    function toggleModal(id, show) { 
        const overlay = document.getElementById(id + '-overlay');
        if (show) {
            lastScrollY = window.scrollY;
            overlay.style.display = 'flex';
            document.body.style.top = `-${lastScrollY}px`;
            document.body.classList.add('modal-open-fixed');
        } else {
            overlay.style.display = 'none';
            if (!document.querySelector('.modal-overlay[style*="display: flex"]')) {
                document.body.classList.remove('modal-open-fixed');
                document.body.style.top = '';
                window.scrollTo(0, lastScrollY);
            }
        }
    }
    
    function showToast(m) { const t=document.getElementById('toast'); t.innerText=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'), 2000); }

    async function handleAuth() {
        const pass = document.getElementById('main-pass').value; if (!pass) return;
        
        document.getElementById('main-pass').blur();
        const tokenInput = document.getElementById('gh-token');
        if(tokenInput) tokenInput.blur();
        
        await new Promise(resolve => setTimeout(resolve, 350)); 

        await CryptoSvc.deriveKey(pass);
        if (!ENCRYPTED_TK) {
            const tk = document.getElementById('gh-token').value.trim(); 
            if (!tk.startsWith('ghp_')) { showToast("Token无效"); return; }
            const encryptedTk = await CryptoSvc.encrypt(tk);
            localStorage.setItem('ae_enc_tk', encryptedTk); FINAL_TOKEN = tk;
        } else {
            const decryptedTk = await CryptoSvc.decrypt(ENCRYPTED_TK);
            decryptedTk ? FINAL_TOKEN = decryptedTk : (showToast("密码错误或数据损坏"));
            if (!decryptedTk) return;
        }
        
        // ─── 核心修改：通过向 body 添加 .unlocked 类，动态优雅地切回列表的高级渐变背板 ───
        document.body.classList.add('unlocked');

        document.getElementById('auth-ui').style.display = 'none'; 
        document.getElementById('main-ui').style.display = 'block'; 
        document.getElementById('actions').style.visibility = 'visible'; 
        
        window.scrollTo(0, 0);
        document.body.scrollTop = 0;
        
        startSync();
    }

    async function startSync() {
        const container = document.getElementById('list-container'); container.innerHTML = '<div class="status-msg">同步中...</div>';
        try {
            const resp = await fetch('https://api.github.com/gists', { headers: { 'Authorization': `token ${FINAL_TOKEN}` } });
            const data = await resp.json(); const db = data.find(g => g.files['aegis_db.json']);
            if(db) {
                GIST_ID = db.id; localStorage.setItem('ae_gid', GIST_ID);
                const detail = await (await fetch(db.url, { headers: { Authorization: `token ${FINAL_TOKEN}` } })).json();
                const rawContent = detail.files['aegis_db.json'].content;
                let list = [];
                if (rawContent && rawContent !== "[]") {
                    const decrypted = await CryptoSvc.decrypt(rawContent); list = JSON.parse(decrypted || "[]");
                }
                render(list);
            } else { startSyncNew(); }
        } catch(e) { container.innerHTML = '<div class="status-msg">同步失败</div>'; }
    }

    async function startSyncNew() {
        try {
            const res = await fetch('https://api.github.com/gists', {
                method: 'POST', headers: { Authorization: `token ${FINAL_TOKEN}` },
                body: JSON.stringify({ description: "Aegis Data", public: false, files: { "aegis_db.json": { content: "[]" } } })
            });
            const data = await res.json(); GIST_ID = data.id; localStorage.setItem('ae_gid', GIST_ID); render([]);
        } catch(e) { showToast("初始化失败"); }
    }

    function handleSearch(val) { const query = (val || "").toLowerCase().trim(); if (!query) { render(CACHED_LIST); return; } render(CACHED_LIST.filter(item => item.name.toLowerCase().includes(query) || (item.user && item.user.toLowerCase().includes(query))), true); }
    
    async function save() { 
        const name = document.getElementById('add-name').value.trim(), pass = document.getElementById('add-pass').value.trim(); 
        if(!name || !pass) return;
        const saveBtn = document.getElementById('save-btn'); saveBtn.disabled = true; saveBtn.innerText = "同步中...";
        
        const now = new Date();
        const timeStr = `${now.getFullYear()}-${(now.getMonth()+1).toString().padStart(2, '0')}-${now.getDate().toString().padStart(2, '0')} ${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;

        try { 
            let list = await getLatest(); 
            const payload = { name, user: document.getElementById('add-user').value, pass, note: document.getElementById('add-note').value, updatedAt: timeStr };
            if (currentEditId) { 
                const index = list.findIndex(i => i.id == currentEditId); if (index !== -1) list[index] = { ...list[index], ...payload }; 
            } else { 
                list.push({ ...payload, id: Date.now() }); 
            } 
            await updateCloud(list); clearSearch(); toggleModal('add-modal', false); 
        } catch (e) { showToast("同步失败"); } finally { 
            saveBtn.disabled = false; saveBtn.innerText = "同步云端"; 
        }
    }

    async function getLatest() { 
        const r = await fetch(`https://api.github.com/gists/${GIST_ID}`, { headers: { Authorization: `token ${FINAL_TOKEN}` }}); 
        const data = await r.json(); const content = data.files['aegis_db.json'].content;
        if (!content || content === "[]") return [];
        const decrypted = await CryptoSvc.decrypt(content); return JSON.parse(decrypted || "[]");
    }

    async function updateCloud(list) { 
        const encryptedData = await CryptoSvc.encrypt(JSON.stringify(list));
        await fetch(`https://api.github.com/gists/${GIST_ID}`, { 
            method: 'PATCH', headers: { Authorization: `token ${FINAL_TOKEN}` }, 
            body: JSON.stringify({ files: { "aegis_db.json": { content: encryptedData } } }) 
        }); 
        render(list); showToast("已同步"); 
    }

    function hardReset() { localStorage.clear(); location.reload(); }
    if (!ENCRYPTED_TK) { document.getElementById('auth-brand-text').innerText = "AEGIS SETUP"; document.getElementById('setup-area').style.display = "block"; } else { document.getElementById('reset-link').style.display = "block"; }
</script>
</body>
</html>
