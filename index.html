<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Aegis - Encrypted</title>
    <link id="favicon" rel="icon" type="image/svg+xml">
    <style>
        /* 保持原始核心样式不动 */
        * { box-sizing: border-box; }
        :root {
            --bg-base: #f5f5f7; --accent: #007aff; --danger: #ff3b30; --secondary: #86868b;
            --side-gap: 20px; --glass-bg: rgba(255, 255, 255, 0.75); --glass-blur: blur(20px);
            --glass-border: 1px solid rgba(255, 255, 255, 0.6); --card-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
            --radius-lg: 28px; --radius-md: 14px;
        }
        body, html {
            margin: 0; padding: 0; width: 100%; min-height: 100%;
            background-color: var(--bg-base); color: #1d1d1f;
            font-family: -apple-system, "SF Pro Display", "PingFang SC", sans-serif;
            -webkit-font-smoothing: antialiased; -webkit-tap-highlight-color: transparent; overflow-x: hidden;
        }
        .gradient-bg {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(135deg, #e2e8f0 0%, #f9fafb 50%, #e2e8f0 100%);
            background-size: 400% 400%; animation: gradientFlow 15s ease-in-out infinite; z-index: -1;
        }
        @keyframes gradientFlow { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        header {
            position: fixed; top: 0; left: 0; width: 100%;
            padding: calc(18px + env(safe-area-inset-top)) var(--side-gap) 15px;
            z-index: 100; display: flex; justify-content: space-between; align-items: center;
            background: rgba(245, 245, 247, 0.85); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
        }
        .brand { display: flex; align-items: center; gap: 10px; flex-shrink: 0; transition: opacity 0.25s ease; }
        .brand-logo { color: var(--accent); display: flex; align-items: center; }
        .brand-name { font-size: 19px; font-weight: 800; letter-spacing: 0.25em; text-transform: uppercase; }
        
        body:has(#auth-ui[style*="display: flex"]) header .brand,
        body:has(#auth-ui:not([style*="display: none"])) header .brand {
            opacity: 0;
            pointer-events: none;
        }

        .header-actions { display: flex; gap: 10px; visibility: hidden; align-items: center; flex: 1; justify-content: flex-end; margin-left: 12px; }
        .search-wrapper { display: flex; align-items: center; background: rgba(0, 0, 0, 0.05); border-radius: 12px; width: 40px; height: 40px; overflow: hidden; position: relative; }
        .search-icon { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; color: var(--secondary); flex-shrink: 0; }
        .search-input { border: none; background: transparent; height: 100%; width: 0; padding: 0; font-size: 16px; outline: none; color: #1d1d1f; line-height: normal; }
        .search-clear { width: 32px; height: 40px; color: var(--secondary); cursor: pointer; display: none; align-items: center; justify-content: center; flex-shrink: 0; }
        
        @media (max-width: 767px) {
            .header-actions.search-active .action-btn { display: none; }
            .header-actions.search-active .search-wrapper { 
                width: 100%; 
                max-width: 200px; 
                background: #fff; 
                box-shadow: 0 0 0 1px rgba(0,0,0,0.1); 
            }
            .header-actions.search-active .search-input { width: 100%; padding: 0 4px; }
        }
        @media (min-width: 768px) { .search-wrapper { width: 200px; transition: none; } .search-wrapper:focus-within { background: #fff; box-shadow: 0 0 0 1px rgba(0,0,0,0.05); } .search-input { width: 100%; padding-right: 10px; } }
        .search-wrapper.has-content .search-clear { display: flex; }
        .action-btn { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; border-radius: 12px; background: rgba(255, 255, 255, 0.5); border: 1px solid rgba(0, 0, 0, 0.05); flex-shrink: 0; }
        
        .page-wrapper { 
            width: 100%; 
            max-width: 1000px; 
            margin: 0 auto; 
            min-height: 100vh; 
            padding: calc(76px + env(safe-area-inset-top)) var(--side-gap) 40px; 
        }
        @media (min-width: 768px) {
            .page-wrapper {
                padding-top: calc(96px + env(safe-area-inset-top));
            }
        }

        #list-container { display: grid; grid-template-columns: 100%; gap: 16px; }
        @media (min-width: 768px) { #list-container { grid-template-columns: repeat(2, 1fr); gap: 20px; } }
        
        .item-card { 
            background: var(--glass-bg); 
            backdrop-filter: var(--glass-blur); 
            border-radius: var(--radius-lg); 
            border: var(--glass-border); 
            box-shadow: var(--card-shadow); 
            padding: 22px; 
            position: relative; 
            transition: transform 0.2s; 
        }
        .card-actions { position: absolute; top: 18px; right: 18px; display: flex; gap: 2px; }
        .card-info { padding-right: 110px; text-align: left; }
        .item-name { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; margin:0; font-size:18px; font-weight: 700; }
        .info-row { margin-top: 6px; display: flex; flex-direction: column; gap: 2px; }
        .item-user, .pass-val { font-size:13px; font-family: ui-monospace, monospace; }
        .item-user { color:var(--secondary); margin: 0; }
        .pass-val { color: var(--accent); filter: blur(5px); opacity: 0.3; transition: all 0.3s; user-select: none; }
        .item-card.revealed .pass-val { filter: blur(0); opacity: 1; user-select: text; }
        .tool-btn { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border: none; background: transparent; color: var(--secondary); cursor: pointer; border-radius: 8px; }
        .tool-btn.active { color: var(--accent); background: rgba(0, 122, 255, 0.1); }
        
        /* 调整备注样式：底部内边距为0，方便时间对齐 */
        .item-note { 
            margin:10px 0 0 0; 
            padding-top: 10px; 
            border-top: 0.5px solid rgba(0,0,0,0.05); 
            font-size:12px; 
            color: var(--secondary); 
            opacity: 0.8; 
            display: -webkit-box; 
            -webkit-line-clamp: 2; 
            -webkit-box-orient: vertical; 
            overflow: hidden; 
            line-height: 1.5; /* 明确行高 */
        }
        
        /* 时间记录样式调整：与备注行对齐，字号增大到12px(同备注) */
        .item-time {
            position: absolute;
            bottom: 22px; /* 与卡片 padding 对齐 */
            right: 22px;
            font-size: 11px; /* 稍微大一点，建议11px或12px */
            color: var(--secondary);
            opacity: 0.4;
            font-family: ui-monospace, monospace;
            line-height: 1.5; /* 与备注行高一致 */
        }

        .auth-viewport { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 0 var(--side-gap); }
        .glass-card { background: var(--glass-bg); backdrop-filter: var(--glass-blur); border-radius: var(--radius-lg); border: var(--glass-border); padding: 32px 24px; width: 100%; max-width: 340px; text-align: center; }
        input { width: 100%; height: 50px; padding: 0 16px; margin: 8px 0; border-radius: var(--radius-md); border: 1px solid rgba(0,0,0,0.08); font-size: 16px; outline: none; background: rgba(255,255,255,0.6); }
        .primary-btn { width: 100%; height: 50px; background: var(--accent); border: none; border-radius: var(--radius-md); color: white; font-size: 16px; font-weight: 600; margin-top: 12px; cursor: pointer; transition: opacity 0.3s; }
        .primary-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.25); z-index: 200; display: none; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        #toast { position: fixed; bottom: 50px; left: 50%; transform: translateX(-50%) translateY(20px); background: rgba(0,0,0,0.85); color: white; padding: 12px 24px; border-radius: 24px; z-index: 1000; opacity: 0; pointer-events: none; transition: all 0.4s; }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .status-msg { width: 100%; padding: 60px 0; color: var(--secondary); text-align: center; grid-column: 1/-1; }

        #login-card {
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.45);
            box-shadow: 0 4px 24px -1px rgba(0, 0, 0, 0.01), 
                        0 24px 60px -8px rgba(0, 0, 0, 0.05), 
                        inset 0 1px 0 rgba(255, 255, 255, 0.4);
            max-width: 360px;
            min-height: 290px;
            padding: 28px;
            border-radius: 30px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: stretch;
            text-align: left;
            position: relative;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        .card-brand-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 24px;
        }
        .card-brand-logo { color: var(--accent); display: flex; align-items: center; }
        .card-brand-name { font-size: 15px; font-weight: 800; letter-spacing: 0.25em; color: #1d1d1f; }
        #login-card h2 { display: none; }
        .auth-form-body { display: flex; flex-direction: column; gap: 4px; }
        #login-card input {
            background: rgba(255, 255, 255, 0.75);
            border: 1px solid rgba(0, 0, 0, 0.05);
            border-radius: 15px;
            height: 50px;
            font-size: 15px;
            color: #1d1d1f;
            box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.01);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #login-card input::placeholder { color: #a1a1a6; }
        #login-card input:focus {
            background: #ffffff;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(0, 122, 255, 0.12);
        }
        #login-card .primary-btn {
            background: linear-gradient(180deg, #2f91ff 0%, var(--accent) 100%);
            border-radius: 15px;
            height: 50px;
            font-size: 15px;
            font-weight: 600;
            margin-top: 10px;
            box-shadow: 0 4px 14px rgba(0, 122, 255, 0.15);
            transition: all 0.25s ease;
        }
        #login-card .primary-btn:hover:not(:disabled) { opacity: 0.95; transform: translateY(-0.5px); }
        #setup-area { animation: fadeInFlag 0.4s ease forwards; }
        @keyframes fadeInFlag { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
        #reset-link { transition: all 0.2s ease !important; font-weight: 500; padding: 8px 12px; border-radius: 8px; display: inline-block; text-align: center; margin-top: 12px !important; }
        #reset-link:hover { opacity: 1 !important; color: var(--danger) !important; background: rgba(255, 59, 48, 0.06); }
    </style>
</head>
<body>
<div class="gradient-bg"></div>
<header>
    <div class="brand">
        <div class="brand-logo"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22C12 22 20 18 20 12V5L12 2L4 5V12C4 12 12 22 12 22Z"/><path d="M9 12L11 14L15 10"/></svg></div>
        <div class="brand-name">AEGIS</div>
    </div>
    <div class="header-actions" id="actions">
        <div class="search-wrapper" id="search-wrapper">
            <div class="search-icon" onclick="focusSearch()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            </div>
            <input type="text" id="search-bar" class="search-input" placeholder="搜索..." oninput="handleSearchUI(this)" onfocus="handleSearchUI(this)" onblur="handleSearchUI(this)">
            <div class="search-clear" onmousedown="event.preventDefault();clearSearch()" ontouchstart="event.preventDefault();clearSearch()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </div>
        </div>
        <div class="action-btn" onmousedown="event.preventDefault();openAddModal()" ontouchstart="event.preventDefault();openAddModal()" style="color:var(--accent)"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></div>
        <div class="action-btn" onmousedown="event.preventDefault();softLock()" ontouchstart="event.preventDefault();softLock()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div>
    </div>
</header>

<div class="auth-viewport" id="auth-ui">
    <div class="glass-card" id="login-card">
        <div class="card-brand-header">
            <div class="card-brand-logo">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22C12 22 20 18 20 12V5L12 2L4 5V12C4 12 12 22 12 22Z"/><path d="M9 12L11 14L15 10"/></svg>
            </div>
            <div class="card-brand-name">AEGIS</div>
        </div>
        <h2>解锁保险库</h2>
        <div class="auth-form-body">
            <input type="password" id="main-pass" placeholder="解锁密码" autofocus>
            <div id="setup-area" style="display:none; margin-top:4px;"><input type="password" id="gh-token" placeholder="GitHub Token (ghp_...)"></div>
            <button class="primary-btn" onclick="handleAuth()">进入系统</button>
            <p id="reset-link" style="font-size:12px; color:#86868b; margin-top:25px; cursor:pointer; display:none; opacity:0.6" onclick="toggleModal('hard-reset', true)">重置 Token 配置</p>
        </div>
    </div>
</div>

<div class="page-wrapper" id="main-ui" style="display:none"><div id="list-container"></div></div>

<div class="modal-overlay" id="add-modal-overlay"><div class="glass-card"><h3 id="modal-title">凭据操作</h3><input type="text" id="add-name" placeholder="应用名称"><input type="text" id="add-user" placeholder="用户名"><input type="password" id="add-pass" placeholder="密码"><input type="text" id="add-note" placeholder="备注"><button class="primary-btn" id="save-btn" onclick="save()">同步至云端</button><button class="primary-btn" style="background:none; color:var(--accent)" onclick="toggleModal('add-modal', false)">取消</button></div></div>
<div class="modal-overlay" id="confirm-modal-overlay"><div class="glass-card"><h3 style="color:var(--danger)">确认删除？</h3><button class="primary-btn" id="confirm-delete-btn" style="background:var(--danger)">确定删除</button><button class="primary-btn" style="background:none; color:var(--accent)" onclick="toggleModal('confirm-modal', false)">取消</button></div></div>
<div class="modal-overlay" id="hard-reset-overlay"><div class="glass-card"><h3 style="color:var(--danger)">确定重置吗？</h3><button class="primary-btn" style="background:var(--danger)" onclick="hardReset()">确定重置</button><button class="primary-btn" style="background:none; color:var(--accent)" onclick="toggleModal('hard-reset', false)">取消</button></div></div>
<div id="toast"></div>

<script>
    /** 加密工具模块 **/
    const CryptoSvc = {
        _key: null,
        async deriveKey(pass) {
            const enc = new TextEncoder();
            const baseKey = await crypto.subtle.importKey("raw", enc.encode(pass), "PBKDF2", false, ["deriveKey"]);
            this._key = await crypto.subtle.deriveKey(
                { name: "PBKDF2", salt: enc.encode("aegis-salt-2024"), iterations: 100000, hash: "SHA-256" },
                baseKey, { name: "AES-GCM", length: 256 }, false, ["encrypt", "decrypt"]
            );
        },
        async encrypt(text) {
            const iv = crypto.getRandomValues(new Uint8Array(12));
            const encoded = new TextEncoder().encode(text);
            const cipher = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, this._key, encoded);
            return btoa(JSON.stringify({ iv: Array.from(iv), data: Array.from(new Uint8Array(cipher)) }));
        },
        async decrypt(blob) {
            try {
                const { iv, data } = JSON.parse(atob(blob));
                const decrypted = await crypto.subtle.decrypt(
                    { name: "AES-GCM", iv: new Uint8Array(iv) },
                    this._key, new Uint8Array(data)
                );
                return new TextDecoder().decode(decrypted);
            } catch(e) { return null; }
        }
    };

    let FINAL_TOKEN = "", GIST_ID = localStorage.getItem('ae_gid'), ENCRYPTED_TK = localStorage.getItem('ae_enc_tk');
    let deleteTargetId = null, currentEditId = null, CACHED_LIST = []; 

    document.addEventListener('click', (e) => {
        const bar = document.getElementById('search-bar');
        const wrapper = document.getElementById('search-wrapper');
        const isToolBtn = e.target.closest('.tool-btn'); 
        if (wrapper && !wrapper.contains(e.target) && bar && bar.value === "" && !isToolBtn) { 
            bar.blur(); 
        }
    });

    window.addEventListener('touchmove', () => {
        const bar = document.getElementById('search-bar');
        if (bar === document.activeElement && bar.value === "") { bar.blur(); }
    }, {passive: true});

    function focusSearch() { document.getElementById('search-bar').focus(); }
    function handleSearchUI(input) {
        const wrapper = document.getElementById('search-wrapper'), actions = document.getElementById('actions');
        const hasText = input.value.length > 0;
        const isFocused = document.activeElement === input;
        if (hasText) wrapper.classList.add('has-content'); else wrapper.classList.remove('has-content');
        if (isFocused || hasText) actions.classList.add('search-active'); else actions.classList.remove('search-active');
        handleSearch(input.value);
    }
    function clearSearch() {
        const input = document.getElementById('search-bar');
        input.value = ''; handleSearchUI(input);
        input.focus();
    }

    function render(list, isSearching = false) {
        if (!isSearching) CACHED_LIST = list; 
        const c = document.getElementById('list-container');
        c.innerHTML = list.length ? '' : `<div class="status-msg">${isSearching ? '未找到相关凭据' : '暂无凭据'}</div>`;
        list.sort((a,b)=>b.id-a.id).forEach(item => {
            const div = document.createElement('div');
            div.className = 'item-card'; div.id = `card-${item.id}`;
            const itemStr = JSON.stringify(item).replace(/"/g, '&quot;');
            div.innerHTML = `
                <div class="card-actions">
                    <button class="tool-btn" onmousedown="event.preventDefault();togglePass('${item.id}', this)" ontouchstart="event.preventDefault();togglePass('${item.id}', this)"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M1 12s4-8 11-8 11-8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
                    <button class="tool-btn" onmousedown="event.preventDefault();copy('${item.pass}')" ontouchstart="event.preventDefault();copy('${item.pass}')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button>
                    <button class="tool-btn" onmousedown="event.preventDefault();openEditModal(${itemStr})" ontouchstart="event.preventDefault();openEditModal(${itemStr})"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
                    <button class="tool-btn" onmousedown="event.preventDefault();confirmDelete('${item.id}')" ontouchstart="event.preventDefault();confirmDelete('${item.id}')" style="color:var(--danger)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2-2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>
                </div>
                <div class="card-info">
                    <h3 class="item-name">${item.name}</h3>
                    <div class="info-row">
                        <p class="item-user">${item.user || '-'}</p>
                        <div id="p-${item.id}" class="pass-val">${item.pass}</div>
                    </div>
                    ${item.note ? `<p class="item-note">${item.note}</p>` : ''}
                </div>
                ${item.updatedAt ? `<div class="item-time">${item.updatedAt}</div>` : ''} 
            `;
            c.appendChild(div);
        });
    }

    function togglePass(id, btn) { document.getElementById('card-'+id).classList.toggle('revealed'); btn.classList.toggle('active'); }
    function copy(t) { navigator.clipboard.writeText(t); showToast("已复制"); }
    function openAddModal() { currentEditId = null; document.getElementById('modal-title').innerText = "新增凭据"; ['add-name','add-user','add-pass','add-note'].forEach(i => document.getElementById(i).value=''); toggleModal('add-modal', true); }
    function openEditModal(item) { currentEditId = item.id; document.getElementById('modal-title').innerText = "修改凭据"; document.getElementById('add-name').value = item.name; document.getElementById('add-user').value = item.user; document.getElementById('add-pass').value = item.pass; document.getElementById('add-note').value = item.note || ''; toggleModal('add-modal', true); }
    
    function confirmDelete(id) { 
        deleteTargetId = id; 
        const confirmBtn = document.getElementById('confirm-delete-btn');
        confirmBtn.innerText = "确定删除";
        toggleModal('confirm-modal', true); 
        confirmBtn.onclick = async function() { 
            this.disabled = true; this.innerText = "正在删除...";
            try { 
                let list = await getLatest(); 
                list = list.filter(i => i.id != deleteTargetId); 
                await updateCloud(list); 
                clearSearch(); 
            } catch(e) { showToast("删除失败"); } finally { 
                this.disabled = false; this.innerText = "确定删除"; toggleModal('confirm-modal', false); 
            } 
        }; 
    }

    function softLock() { location.reload(); }
    function toggleModal(id, show) { document.getElementById(id + '-overlay').style.display = show ? 'flex' : 'none'; }
    function showToast(m) { const t=document.getElementById('toast'); t.innerText=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'), 2000); }

    async function handleAuth() {
        const pass = document.getElementById('main-pass').value; if (!pass) return;
        await CryptoSvc.deriveKey(pass);
        if (!ENCRYPTED_TK) {
            const tk = document.getElementById('gh-token').value.trim(); 
            if (!tk.startsWith('ghp_')) { showToast("Token无效"); return; }
            const encryptedTk = await CryptoSvc.encrypt(tk);
            localStorage.setItem('ae_enc_tk', encryptedTk); 
            FINAL_TOKEN = tk;
        } else {
            const decryptedTk = await CryptoSvc.decrypt(ENCRYPTED_TK);
            if (!decryptedTk) { showToast("密码错误或数据损坏"); return; }
            FINAL_TOKEN = decryptedTk;
        }
        document.getElementById('auth-ui').style.display = 'none'; document.getElementById('main-ui').style.display = 'block'; document.getElementById('actions').style.visibility = 'visible'; startSync();
    }

    async function startSync() {
        const container = document.getElementById('list-container'); container.innerHTML = '<div class="status-msg">同步中...</div>';
        try {
            const resp = await fetch('https://api.github.com/gists', { headers: { 'Authorization': `token ${FINAL_TOKEN}` } });
            const data = await resp.json(); const db = data.find(g => g.files['aegis_db.json']);
            if(db) {
                GIST_ID = db.id; localStorage.setItem('ae_gid', GIST_ID);
                const detail = await (await fetch(db.url, { headers: { Authorization: `token ${FINAL_TOKEN}` } })).json();
                const rawContent = detail.files['aegis_db.json'].content;
                let list = [];
                if (rawContent && rawContent !== "[]") {
                    const decrypted = await CryptoSvc.decrypt(rawContent);
                    list = JSON.parse(decrypted || "[]");
                }
                render(list);
            } else { startSyncNew(); }
        } catch(e) { container.innerHTML = '<div class="status-msg">同步失败</div>'; }
    }

    async function startSyncNew() {
        try {
            const res = await fetch('https://api.github.com/gists', {
                method: 'POST', headers: { Authorization: `token ${FINAL_TOKEN}` },
                body: JSON.stringify({ description: "Aegis Data", public: false, files: { "aegis_db.json": { content: "[]" } } })
            });
            const data = await res.json(); GIST_ID = data.id; localStorage.setItem('ae_gid', GIST_ID); render([]);
        } catch(e) { showToast("初始化失败"); }
    }

    function handleSearch(val) { const query = (val || "").toLowerCase().trim(); if (!query) { render(CACHED_LIST); return; } render(CACHED_LIST.filter(item => item.name.toLowerCase().includes(query) || (item.user && item.user.toLowerCase().includes(query))), true); }
    
    async function save() { 
        const name = document.getElementById('add-name').value.trim(), pass = document.getElementById('add-pass').value.trim(); 
        if(!name || !pass) return;
        const saveBtn = document.getElementById('save-btn'); 
        const originalText = saveBtn.innerText;
        saveBtn.disabled = true; saveBtn.innerText = "同步中...";
        
        const now = new Date();
        const timeStr = `${now.getFullYear()}-${(now.getMonth()+1).toString().padStart(2, '0')}-${now.getDate().toString().padStart(2, '0')} ${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;

        try { 
            let list = await getLatest(); 
            if (currentEditId) { 
                const index = list.findIndex(i => i.id == currentEditId); 
                if (index !== -1) {
                    list[index] = { 
                        ...list[index], 
                        name, 
                        user: document.getElementById('add-user').value, 
                        pass, 
                        note: document.getElementById('add-note').value,
                        updatedAt: timeStr 
                    }; 
                }
            } else { 
                list.push({
                    name, 
                    user: document.getElementById('add-user').value, 
                    pass, 
                    note: document.getElementById('add-note').value, 
                    id: Date.now(),
                    updatedAt: timeStr 
                }); 
            } 
            await updateCloud(list); 
            clearSearch(); 
            toggleModal('add-modal', false); 
        } catch (e) { 
            showToast("同步失败"); 
        } finally { 
            saveBtn.disabled = false; 
            saveBtn.innerText = originalText; 
        }
    }

    async function getLatest() { 
        const r = await fetch(`https://api.github.com/gists/${GIST_ID}`, { headers: { Authorization: `token ${FINAL_TOKEN}` }}); 
        const data = await r.json(); 
        const content = data.files['aegis_db.json'].content;
        if (!content || content === "[]") return [];
        const decrypted = await CryptoSvc.decrypt(content);
        return JSON.parse(decrypted || "[]");
    }

    async function updateCloud(list) { 
        const encryptedData = await CryptoSvc.encrypt(JSON.stringify(list));
        await fetch(`https://api.github.com/gists/${GIST_ID}`, { 
            method: 'PATCH', 
            headers: { Authorization: `token ${FINAL_TOKEN}` }, 
            body: JSON.stringify({ files: { "aegis_db.json": { content: encryptedData } } }) 
        }); 
        render(list); showToast("已同步"); 
    }

    function hardReset() { localStorage.clear(); location.reload(); }
    (function generateFavicon() { const svg = btoa(`<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#007aff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22C12 22 20 18 20 12V5L12 2L4 5V12C4 12 12 22 12 22Z M9 12L11 14L15 10"/></svg>`); document.getElementById('favicon').setAttribute('href', `data:image/svg+xml;base64,${svg}`); })();
    if (!ENCRYPTED_TK) { document.querySelector('.card-brand-name').innerText = "AEGIS SETUP"; document.getElementById('setup-area').style.display = "block"; } else { document.getElementById('reset-link').style.display = "block"; }
</script>
